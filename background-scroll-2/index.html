<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Scroll 2</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f5e3bf;
    }
    body {
      overflow-y: auto;
      overflow-x: hidden;
    }
    .image-wrap {
      width: 100%;
      min-height: 100vh;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="image-wrap">
    <img src="../12%20(2).png" alt="Background 12 (2)">
  </div>
</body>
</html>

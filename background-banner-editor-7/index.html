            '  align-items: center !important;',
            '  justify-content: center !important;',
            '  width: 100% !important;',
            '  height: 100% !important;',
            '  white-space: pre-line !important;',
            '  word-break: keep-all !important;',
            '  overflow-wrap: normal !important;',
            '  line-height: 1 !important;',
            '  letter-spacing: 0 !important;',
            '  text-orientation: upright !important;',
            '  writing-mode: horizontal-tb !important;',
            '  overflow: hidden !important;',
            '}',
            '.box.vertical-text .box-content > span {',
            '  display: block !important;',
            '  flex: 0 0 auto !important;',
            '  width: auto !important;',
            '  max-width: 100% !important;',
            '  margin: 0 0 0.12em 0 !important;',
            '  padding: 0 !important;',
            '  line-height: 1 !important;',

            '}',
            '.box.vertical-text {',

            '}',
            '.resize-handle {',

            '  background: transparent !important;',
            '  border-color: transparent !important;',
            '  box-shadow: none !important;',
            '}',
            '.lines-svg, .line-group, .line-path, .line-hit {',
            '  shape-rendering: geometricPrecision !important;',
            '  text-rendering: geometricPrecision !important;',
            '  image-rendering: -webkit-optimize-contrast;',
            '}',
            '.multi-select-rect {',
            '  position: absolute;',
            '  border: 1px dashed rgba(47, 128, 237, 0.82);',
            '  background: rgba(47, 128, 237, 0.12);',
            '  display: none;',
            '  pointer-events: none;',
            '  z-index: 35;',
            '}',
            '.group-selection-outline {',
            '  position: absolute;',
            '  border: 1px dashed rgba(47, 128, 237, 0.82);',
            '  display: none;',
            '  pointer-events: none;',
            '  z-index: 34;',
            '}',
            '.group-resize-handle {',
            '  position: absolute;',
            '  width: 14px;',
            '  height: 14px;',
            '  margin-left: -7px;',
            '  margin-top: -7px;',
            '  border-radius: 50%;',
            '  border: 1px solid rgba(47, 128, 237, 0.9);',
            '  background: #ffffff;',
            '  display: none;',
            '  z-index: 36;',
            '  cursor: nwse-resize;',
            '  box-sizing: border-box;',
            '  pointer-events: none;',
            '}'
          ].join('\\n');
          document.head.appendChild(style);

          const guideLayer = document.createElement('div');
          guideLayer.style.position = 'absolute';
          guideLayer.style.inset = '0';
          guideLayer.style.pointerEvents = 'none';
          guideLayer.style.zIndex = '30';

          const horizontalGuide = document.createElement('div');
          horizontalGuide.style.position = 'absolute';
          horizontalGuide.style.height = '0';
          horizontalGuide.style.borderTop = '1px dashed rgba(47, 128, 237, 0.82)';
          horizontalGuide.style.display = 'none';
          guideLayer.appendChild(horizontalGuide);

          const verticalGuide = document.createElement('div');
          verticalGuide.style.position = 'absolute';
          verticalGuide.style.width = '0';
          verticalGuide.style.borderLeft = '1px dashed rgba(47, 128, 237, 0.82)';
          verticalGuide.style.display = 'none';
          guideLayer.appendChild(verticalGuide);

          const selectionRect = document.createElement('div');
          selectionRect.className = 'multi-select-rect';
          guideLayer.appendChild(selectionRect);

          const groupSelectionOutline = document.createElement('div');
          groupSelectionOutline.className = 'group-selection-outline';
          guideLayer.appendChild(groupSelectionOutline);

          const groupResizeHandle = document.createElement('div');
          groupResizeHandle.className = 'group-resize-handle';
          guideLayer.appendChild(groupResizeHandle);
          overlay.appendChild(guideLayer);

          let multiSelectedBoxIds = new Set();
          let isMarqueeSelecting = false;
          let marqueeStart = null;
          let groupDragBoxes = null;
          let groupResizeState = null;
          let suppressNextOverlayClick = false;
          let boxTextDirectionInput = null;
          let boxSnapControls = null;
          let activeLineSegmentDrag = null;
          let snapHorizontalEnabled = true;
          let snapVerticalEnabled = true;

          function ensureTextDirectionControl() {
            if (boxTextDirectionInput && document.body.contains(boxTextDirectionInput)) return boxTextDirectionInput;
            const fontSizeRow = boxFontSizeInput ? boxFontSizeInput.closest('.toolbox-row') : null;
            if (!fontSizeRow || !fontSizeRow.parentNode) return null;

            const row = document.createElement('div');
            row.className = 'toolbox-row';

            const label = document.createElement('label');
            label.setAttribute('for', 'boxTextDirectionInput');
            label.textContent = 'Huong chu';

            const select = document.createElement('select');
            select.id = 'boxTextDirectionInput';
            select.innerHTML = '<option value=\"horizontal\">Ngang</option><option value=\"vertical\">Doc</option>';

            row.appendChild(label);
            row.appendChild(select);
            fontSizeRow.parentNode.insertBefore(row, fontSizeRow.nextSibling);
            boxTextDirectionInput = select;

            select.addEventListener('input', (event) => {
              event.stopPropagation();
              updateSelectedBox({ textDirection: select.value });
            });

            return select;
          }

          function ensureBoxSnapControls() {
            if (boxSnapControls && document.body.contains(boxSnapControls.wrap)) return boxSnapControls;
            const directionRow = ensureTextDirectionControl() ? ensureTextDirectionControl().closest('.toolbox-row') : null;
            if (!directionRow || !directionRow.parentNode) return null;

            const row = document.createElement('div');
            row.className = 'toolbox-row';
            row.id = 'boxSnapControls';
            row.innerHTML = [
              '<label>Can thang hang</label>',
              '<div class="toolbox-actions" style="gap:8px; flex-wrap:wrap;">',
              '  <label style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#5d432f;">',
              '    <input id="snapHorizontalInput" type="checkbox" checked /> Ngang',
              '  </label>',
              '  <label style="display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#5d432f;">',
              '    <input id="snapVerticalInput" type="checkbox" checked /> Doc',
              '  </label>',
              '</div>'
            ].join('');
            directionRow.parentNode.insertBefore(row, directionRow.nextSibling);

            boxSnapControls = {
              wrap: row,
              horizontalInput: row.querySelector('#snapHorizontalInput'),
              verticalInput: row.querySelector('#snapVerticalInput'),
            };
            return boxSnapControls;
          }

          function getStoredTextDirection(box) {
            return box && box.textDirection === 'vertical' ? 'vertical' : box && box.textDirection === 'horizontal' ? 'horizontal' : null;
          }

          function isAdjustableZLine(line, geometry) {
            if (line && line.pathType === 'diagonal') return false;
            if (!line || line.start?.kind !== 'box' || line.end?.kind !== 'box') return false;
            const points = geometry && geometry.points;
            return Array.isArray(points) && points.length >= 4 && Math.abs(points[0].x - points[points.length - 1].x) > 1 && Math.abs(points[0].y - points[points.length - 1].y) > 1;
          }

          function syncSelectedBoxes(ids) {
            multiSelectedBoxIds = new Set(ids);
            if (multiSelectedBoxIds.size > 0) {
              if (!multiSelectedBoxIds.has(selectedBoxId)) selectedBoxId = Array.from(multiSelectedBoxIds)[0];
              selectedLineId = null;
            }
          }

          function clearMultiSelect() {
            multiSelectedBoxIds.clear();
            selectionRect.style.display = 'none';
            groupSelectionOutline.style.display = 'none';
            groupResizeHandle.style.display = 'none';
          }

          function getCanvasPoint(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
              x: (clientX - rect.left) / scale,
              y: (clientY - rect.top) / scale,
            };
          }

          function normalizeRect(a, b) {
            return {
              left: Math.min(a.x, b.x),
              top: Math.min(a.y, b.y),
              right: Math.max(a.x, b.x),
              bottom: Math.max(a.y, b.y),
            };
          }

          function boxIntersectsRect(box, rect) {
            return !(box.x + box.width < rect.left || box.x > rect.right || box.y + box.height < rect.top || box.y > rect.bottom);
          }

          function renderSelectionRect(rect) {
            selectionRect.style.display = 'block';
            selectionRect.style.left = rect.left + 'px';
            selectionRect.style.top = rect.top + 'px';
            selectionRect.style.width = Math.max(0, rect.right - rect.left) + 'px';
            selectionRect.style.height = Math.max(0, rect.bottom - rect.top) + 'px';
          }

          function getMultiSelectionBounds() {
            const selectedBoxes = boxes.filter((box) => multiSelectedBoxIds.has(box.id));
            if (selectedBoxes.length <= 1) return null;
            const left = Math.min(...selectedBoxes.map((box) => box.x));
            const top = Math.min(...selectedBoxes.map((box) => box.y));
            const right = Math.max(...selectedBoxes.map((box) => box.x + box.width));
            const bottom = Math.max(...selectedBoxes.map((box) => box.y + box.height));
            return {
              left,
              top,
              right,
              bottom,
              width: Math.max(1, right - left),
              height: Math.max(1, bottom - top),
              selectedBoxes,
            };
          }

          function renderGroupSelectionBounds() {
            const bounds = getMultiSelectionBounds();
            if (!bounds) {
              groupSelectionOutline.style.display = 'none';
              groupResizeHandle.style.display = 'none';
              return;
            }
            groupSelectionOutline.style.display = 'block';
            groupSelectionOutline.style.left = bounds.left + 'px';
            groupSelectionOutline.style.top = bounds.top + 'px';
            groupSelectionOutline.style.width = bounds.width + 'px';
            groupSelectionOutline.style.height = bounds.height + 'px';
            groupResizeHandle.style.display = 'none';
          }

          function hideAlignGuide() {
            horizontalGuide.style.display = 'none';
            verticalGuide.style.display = 'none';
          }

          function showHorizontalGuide(y, left, right) {
            horizontalGuide.style.display = 'block';
            horizontalGuide.style.top = y + 'px';
            horizontalGuide.style.left = left + 'px';
            horizontalGuide.style.width = Math.max(0, right - left) + 'px';
          }

          function showVerticalGuide(x, top, bottom) {
            verticalGuide.style.display = 'block';
            verticalGuide.style.left = x + 'px';
            verticalGuide.style.top = top + 'px';
            verticalGuide.style.height = Math.max(0, bottom - top) + 'px';
          }

          shouldUseVerticalText = function(box) {
            const storedDirection = getStoredTextDirection(box);
            if (storedDirection) return storedDirection === 'vertical';
            const fontSize = box.fontSize || 20;
            return box.height >= box.width || box.width <= Math.max(18, fontSize * 2.4);
          };

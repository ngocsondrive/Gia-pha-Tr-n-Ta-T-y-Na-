<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body { margin:0; background:#000; font-family:Arial; overflow:auto; cursor:grab; }
body:active { cursor:grabbing; }

#container { position:absolute; transform-origin:top left; }
img { width:100%; }

/* BOX */
.box {
    position:absolute;
    width:150px; height:70px;
    background:white;
    border:2px solid black;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:move;
}
.box.active { outline:3px dashed red; }

.resize-handle {
    position:absolute;
    right:-8px; bottom:-8px;
    width:18px; height:18px;
    cursor:nwse-resize;
}

/* LINE */
.line { position:absolute; pointer-events:auto; }
.line.active { outline:2px dashed yellow; }

/* TOOLBOX */
#tool {
    position:fixed; top:10px; right:10px; width:250px;
    background:white; padding:10px; z-index:9999;
    border:2px solid black; border-radius:5px;
    display:none;
}
#tool input,#tool button { width:100%; margin-bottom:5px; }

#toggleTool { position:fixed; top:10px; right:10px; display:none; z-index:9999; }

#loginBox {
    position:fixed; top:40%; left:50%;
    transform:translate(-50%,-50%);
    display:none; background:white; padding:10px;
    z-index:9999;
}

#loginBtn,#logoutBtn {
    position:fixed; top:10px; right:10px; z-index:9999;
}
#logoutBtn { display:none; }
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<button id="toggleTool">☰</button>

<div id="loginBox">
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button id="okBtn">OK</button>
</div>

<div id="tool">
<h3>Tool Box</h3>
<button id="collapseBtn">− Thu nhỏ</button>
<button id="addBtn">+ Add Box</button>
<button id="saveBtn">💾 Save</button>

Text:<input id="text">
Font Size:<input id="size" type="number" value="16">
Border Size:<input id="borderSize" type="number" value="2">
Border Color:<input id="borderColor" type="color">
Background:<input id="bgColor" type="color">
Text Color:<input id="textColor" type="color">

<button id="drawLineBtn">✏️ Vẽ Line</button>
Line Color: <input type="color" id="lineColor" value="#ff0000">
Line Width: <input type="number" id="lineWidth" value="3">
</div>

<div id="container">
<img src="Background.jpg">
</div>

<script>
let isLogin=false,currentBox=null,scale=1,offsetX=0,offsetY=0,historyStack=[];
const container=document.getElementById("container");

/* LOAD */
window.onload=()=>{
    const data=localStorage.getItem("familyTree");
    if(data){
        container.innerHTML=data;
        rebind();
    }
};

/* REBIND */
function rebind(){
    document.querySelectorAll(".box").forEach(enable);
}

/* LOGIN */
loginBtn.onclick=()=>loginBox.style.display="block";
okBtn.onclick=()=>{
    if(user.value==="a"&&pass.value==="1"){
        isLogin=true;
        loginBox.style.display="none";
        loginBtn.style.display="none";
        logoutBtn.style.display="block";
        tool.style.display="block";
    }
};
logoutBtn.onclick=()=>{
    isLogin=false;
    loginBtn.style.display="block";
    logoutBtn.style.display="none";
    tool.style.display="none";
};

/* TOOL */
collapseBtn.onclick=()=>{ tool.style.display="none"; toggleTool.style.display="block"; };
toggleTool.onclick=()=>{ tool.style.display="block"; toggleTool.style.display="none"; };

/* HISTORY */
function saveHistory(){
    historyStack.push(container.innerHTML);
    if(historyStack.length>50) historyStack.shift();
}
function undo(){
    if(historyStack.length===0) return;
    container.innerHTML=historyStack.pop();
    rebind();
}
document.addEventListener("keydown",e=>{
    if(e.ctrlKey && e.key.toLowerCase()==="z") undo();
});

/* ADD BOX */
addBtn.onclick=()=>{
    if(!isLogin) return;
    saveHistory();

    const box=document.createElement("div");
    box.className="box";
    box.innerText="New";
    box.style.top="100px";
    box.style.left="100px";

    const handle=document.createElement("div");
    handle.className="resize-handle";
    box.appendChild(handle);

    container.appendChild(box);
    enable(box);
};

/* SELECT */
function selectBox(box){
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    box.classList.add("active");
    currentBox=box;

    text.value=box.innerText;
    size.value=parseInt(getComputedStyle(box).fontSize);
}

/* CLICK OUT */
document.addEventListener("click",(e)=>{
    if(e.target.closest(".box")||e.target.closest(".line")) return;
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    currentBox=null;
});

/* UPDATE */
text.oninput=()=>{ if(currentBox) currentBox.innerText=text.value; };
size.oninput=()=>{ if(currentBox) currentBox.style.fontSize=size.value+"px"; };
borderSize.oninput=()=>{ if(currentBox) currentBox.style.borderWidth=borderSize.value+"px"; };
borderColor.oninput=()=>{ if(currentBox) currentBox.style.borderColor=borderColor.value; };
bgColor.oninput=()=>{ if(currentBox) currentBox.style.backgroundColor=bgColor.value; };
textColor.oninput=()=>{ if(currentBox) currentBox.style.color=textColor.value; };

/* DELETE */
document.addEventListener("keydown",e=>{
    if(e.key==="Delete" && currentBox){
        currentBox.remove();
        currentBox=null;
    }
});

/* DRAG */
let dragging=null,dx,dy;
document.addEventListener("mousemove",e=>{
    if(!dragging) return;
    dragging.style.left=(e.clientX/scale-dx)+"px";
    dragging.style.top=(e.clientY/scale-dy)+"px";
});
document.addEventListener("mouseup",()=>dragging=null);

function enable(box){
    const handle=box.querySelector(".resize-handle");

    box.onclick=e=>{
        e.stopPropagation();
        selectBox(box);
    };

    box.onmousedown=e=>{
        if(!isLogin) return;
        if(e.target.classList.contains("resize-handle")) return;
        saveHistory();
        dragging=box;
        dx=e.clientX/scale-box.offsetLeft;
        dy=e.clientY/scale-box.offsetTop;
    };

    handle.onmousedown=e=>{
        if(!isLogin) return;
        e.stopPropagation();
        saveHistory();

        let sx=e.clientX, sy=e.clientY;
        let sw=box.offsetWidth, sh=box.offsetHeight;

        function move(ev){
            box.style.width=(sw+(ev.clientX-sx))+"px";
            box.style.height=(sh+(ev.clientY-sy))+"px";
        }
        function up(){
            document.removeEventListener("mousemove",move);
            document.removeEventListener("mouseup",up);
        }
        document.addEventListener("mousemove",move);
        document.addEventListener("mouseup",up);
    };
}

/* ZOOM */
document.addEventListener("wheel",e=>{
    if(!e.ctrlKey) return;
    e.preventDefault();
    scale+=e.deltaY<0?0.1:-0.1;
    if(scale<1) scale=1;
    container.style.transform=`scale(${scale})`;
},{passive:false});

/* ===== LINE GIỮ NGUYÊN ===== */
const drawLineBtn=document.getElementById("drawLineBtn");
const lineColorInput=document.getElementById("lineColor");
const lineWidthInput=document.getElementById("lineWidth");

let drawLineMode=false;

drawLineBtn.onclick=()=>{
    if(!isLogin) return;
    drawLineMode=true;
};

container.addEventListener("mousedown", e=>{
    if(!drawLineMode) return;

    let x1=e.clientX/scale;
    let y1=e.clientY/scale;

    const line=document.createElement("div");
    line.className="line";

    line.style.borderTop=`${lineWidthInput.value}px solid ${lineColorInput.value}`;
    line.style.width="0px";
    line.style.position="absolute";

    container.appendChild(line);

    function move(ev){
        let x2=ev.clientX/scale;
        let y2=ev.clientY/scale;

        let dx=x2-x1;
        let dy=y2-y1;

        let len=Math.sqrt(dx*dx+dy*dy);
        let angle=Math.atan2(dy,dx)*180/Math.PI;

        line.style.width=len+"px";
        line.style.transform=`rotate(${angle}deg)`;
        line.style.left=x1+"px";
        line.style.top=y1+"px";
    }

    function up(){
        drawLineMode=false;
        container.removeEventListener("mousemove",move);
        container.removeEventListener("mouseup",up);
    }

    container.addEventListener("mousemove",move);
    container.addEventListener("mouseup",up);
});
</script>

</body>
</html>

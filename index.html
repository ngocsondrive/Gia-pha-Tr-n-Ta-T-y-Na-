<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

#container {
    position: relative;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: grab;
}

/* BUTTON */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
}
#logoutBtn { display: none; }

/* LOGIN BOX */
#loginBox {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    display: none;
    z-index: 9999;
}

/* TOOL */
#tool {
    position: fixed;
    top: 50px;
    right: 10px;
    background: white;
    padding: 10px;
    display: none;
    z-index: 9999;
    width: 200px;
}

#tool input, #tool select {
    width: 100%;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="loginBox">
    <input id="user" placeholder="user"><br><br>
    <input id="pass" type="password" placeholder="pass"><br><br>
    <button id="okBtn">OK</button>
</div>

<div id="tool">
    <button id="addBtn">+ Add Box</button><br><br>

    Text:
    <input id="text">

    Font Size:
    <input id="size" type="number" value="16">

    Text Color:
    <input id="color" type="color" value="#000000">

    Background:
    <input id="bg" type="color" value="#ffffff">

    Border Color:
    <input id="borderColor" type="color" value="#000000">

    Border Width:
    <input id="borderWidth" type="number" value="2">

    Radius:
    <input id="radius" type="number" value="10">

    Font:
    <select id="font">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
    </select>
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = false;
let currentBox = null;

/* DOM */
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const loginBox = document.getElementById("loginBox");
const tool = document.getElementById("tool");
const container = document.getElementById("container");

const user = document.getElementById("user");
const pass = document.getElementById("pass");
const okBtn = document.getElementById("okBtn");
const addBtn = document.getElementById("addBtn");

/* TOOL INPUTS */
const textInput = document.getElementById("text");
const sizeInput = document.getElementById("size");
const colorInput = document.getElementById("color");
const bgInput = document.getElementById("bg");
const borderColorInput = document.getElementById("borderColor");
const borderWidthInput = document.getElementById("borderWidth");
const radiusInput = document.getElementById("radius");
const fontInput = document.getElementById("font");

/* LOGIN */
loginBtn.onclick = () => loginBox.style.display = "block";

okBtn.onclick = () => {
    if (user.value === "a" && pass.value === "1") {
        isLogin = true;
        loginBox.style.display = "none";
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        tool.style.display = "block";
    } else {
        alert("Wrong account");
    }
};

logoutBtn.onclick = () => {
    isLogin = false;
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    tool.style.display = "none";
};

/* CREATE BOX */
addBtn.onclick = () => {
    const box = document.createElement("div");
    box.className = "box";
    box.style.top = "100px";
    box.style.left = "100px";

    box.innerText = textInput.value || "New";

    applyStyle(box);
    container.appendChild(box);
    enableDrag(box);

    box.onclick = () => currentBox = box;
};

/* APPLY STYLE */
function applyStyle(box){
    box.style.background = bgInput.value;
    box.style.border = borderWidthInput.value + "px solid " + borderColorInput.value;
    box.style.borderRadius = radiusInput.value + "px";

    box.style.color = colorInput.value;
    box.style.fontSize = sizeInput.value + "px";
    box.style.fontFamily = fontInput.value;
}

/* UPDATE REALTIME */
document.querySelectorAll("#tool input, #tool select").forEach(el=>{
    el.oninput = ()=>{
        if(!currentBox) return;
        currentBox.innerText = textInput.value;
        applyStyle(currentBox);
    };
});

/* DRAG (KHÔNG LỖI) */
function enableDrag(box){
    let dragging = false;
    let offsetX = 0, offsetY = 0;

    box.addEventListener("mousedown", (e)=>{
        if(!isLogin) return;
        dragging = true;
        offsetX = e.clientX - box.offsetLeft;
        offsetY = e.clientY - box.offsetTop;
    });

    document.addEventListener("mousemove", (e)=>{
        if(!dragging) return;
        box.style.left = (e.clientX - offsetX) + "px";
        box.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", ()=>{
        dragging = false;
    });
}
</script>

</body>
</html>

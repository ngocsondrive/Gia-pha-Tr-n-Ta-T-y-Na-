<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: auto;
    cursor: grab;
}
body:active { cursor: grabbing; }

#container {
    position: absolute;
    transform-origin: top left;
}

img { width: 100%; }

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: move;
}

.box.active { outline: 3px dashed red; }

/* RESIZE */
.resize-handle {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 18px;
    height: 18px;
    cursor: nwse-resize;
}

/* LINE */
.line {
    position: absolute;
    pointer-events: all;
    cursor: pointer;
}

.line.active { outline: 2px dashed yellow; }

/* UI */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
}
#logoutBtn { display: none; }

#loginBox, #tool {
    position: fixed;
    background: white;
    padding: 10px;
    z-index: 9999;
}

#loginBox {
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
}

#tool {
    top: 50px;
    right: 10px;
    width: 250px;
    display: none;
    border: 2px solid black;
    border-radius: 5px;
}

#tool h3 { margin:0 0 5px 0; font-size:16px; text-align:center; }

/* MINI TOOL */
#toggleTool {
    position: fixed;
    top: 50px;
    right: 10px;
    z-index: 9999;
    display: none;
}

#tool input, #tool button, #tool label {
    width: 100%;
    margin-bottom: 5px;
}

/* LINE TOOL OPTIONS */
#lineOptions {
    display: none;
    margin-top: 10px;
    border-top: 1px solid #aaa;
    padding-top: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<button id="toggleTool">☰</button>

<div id="loginBox">
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button id="okBtn">OK</button>
</div>

<div id="tool">
    <h3>Tool Box</h3>
    <button id="collapseBtn">− Thu nhỏ</button>
    <button id="addBtn">+ Add Box</button>
    <button id="saveBtn">💾 Save</button>

    Text:
    <input id="text">

    Font Size:
    <input id="size" type="number" value="16">

    Border Size:
    <input id="borderSize" type="number" value="2">

    Border Color:
    <input id="borderColor" type="color">

    Background:
    <input id="bgColor" type="color">

    Text Color:
    <input id="textColor" type="color">

    <label><input type="checkbox" id="lineMode"> Vẽ đường thẳng</label>
    <div id="lineOptions">
        Line Color: <input type="color" id="lineColor" value="#ff0000">
        Line Width: <input type="number" id="lineWidth" value="3">
        <button id="drawLineBtn">✏️ Vẽ Line</button>
    </div>
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin=false, currentBox=null;
let scale=1, offsetX=0, offsetY=0;
let historyStack=[];

let lineMode=false;
let drawLineMode=false;
let currentLine=null;
let startX=0, startY=0;

const container=document.getElementById("container");

/* AUTO LOAD */
window.onload=()=>{
    const data=localStorage.getItem("familyTree");
    if(data){
        container.innerHTML=data;
        rebind();
    }
};

/* LOGIN */
loginBtn.onclick=()=>loginBox.style.display="block";

okBtn.onclick=()=>{
    if(user.value==="a"&&pass.value==="1"){
        isLogin=true;
        loginBox.style.display="none";
        loginBtn.style.display="none";
        logoutBtn.style.display="block";
        tool.style.display="block";
    }
};

logoutBtn.onclick=()=>{
    isLogin=false;
    loginBtn.style.display="block";
    logoutBtn.style.display="none";
    tool.style.display="none";
    toggleTool.style.display="none";
};

/* TOOL COLLAPSE */
collapseBtn.onclick=()=>{
    tool.style.display="none";
    toggleTool.style.display="block";
};

toggleTool.onclick=()=>{
    tool.style.display="block";
    toggleTool.style.display="none";
};

/* HISTORY */
function saveHistory(){
    historyStack.push(container.innerHTML);
    if(historyStack.length>50) historyStack.shift();
}

function undo(){
    if(historyStack.length===0) return;
    container.innerHTML=historyStack.pop();
    rebind();
}

/* CTRL Z */
document.addEventListener("keydown",e=>{
    if(e.ctrlKey && e.key.toLowerCase()==="z"){
        undo();
    }
});

/* ADD BOX */
addBtn.onclick=()=>{
    if(!isLogin) return;
    saveHistory();

    const box=document.createElement("div");
    box.className="box";
    box.innerText="New";
    box.style.top="100px";
    box.style.left="100px";

    const handle=document.createElement("div");
    handle.className="resize-handle";
    box.appendChild(handle);

    container.appendChild(box);
    enable(box);
};

/* SELECT */
function selectBox(box){
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    box.classList.add("active");
    currentBox=box;

    text.value=box.innerText;
    size.value=parseInt(getComputedStyle(box).fontSize);
}

/* CLICK NGOÀI = UNSELECT */
document.addEventListener("click",(e)=>{
    if(e.target.closest(".box") || e.target.closest(".line")) return;

    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".line").forEach(l=>l.classList.remove("active"));
    currentBox=null;
    currentLine=null;
});

/* UPDATE */
text.oninput=()=>{ if(currentBox){ saveHistory(); currentBox.innerText=text.value;} };
size.oninput=()=>{ if(currentBox){ saveHistory(); currentBox.style.fontSize=size.value+"px"; } };
borderSize.oninput=()=>{ if(currentBox){ saveHistory(); currentBox.style.borderWidth=borderSize.value+"px"; } };
borderColor.oninput=()=>{ if(currentBox){ saveHistory(); currentBox.style.borderColor=borderColor.value; } };
bgColor.oninput=()=>{ if(currentBox){ saveHistory(); currentBox.style.backgroundColor=bgColor.value; } };
textColor.oninput=()=>{ if(currentBox){ saveHistory(); currentBox.style.color=textColor.value; } };

/* ENABLE */
function enable(box){
    const handle=box.querySelector(".resize-handle");

    box.onclick=e=>{
        e.stopPropagation();
        selectBox(box);
    };

    enableDrag(box);
    enableResize(box,handle);
}

function rebind(){
    document.querySelectorAll(".box").forEach(enable);
    document.querySelectorAll(".line").forEach(enableLineMoveDelete);
}

/* DRAG */
let dragging=null,dx,dy;
document.addEventListener("mousemove",e=>{
    if(!dragging) return;
    dragging.style.left=(e.clientX/scale-dx)+"px";
    dragging.style.top=(e.clientY/scale-dy)+"px";
});
document.addEventListener("mouseup",()=>dragging=null);

function enableDrag(box){
    box.onmousedown=e=>{
        if(!isLogin) return;
        if(e.target.classList.contains("resize-handle")) return;
        saveHistory();
        dragging=box;
        dx=e.clientX/scale-box.offsetLeft;
        dy=e.clientY/scale-box.offsetTop;
    };
}

/* RESIZE */
let resizing=null,sx,sy,sw,sh;
document.addEventListener("mousemove",e=>{
    if(!resizing) return;
    resizing.style.width=(sw+(e.clientX-sx)/scale)+"px";
    resizing.style.height=(sh+(e.clientY-sy)/scale)+"px";
});
document.addEventListener("mouseup",()=>resizing=null);

function enableResize(box,handle){
    handle.onmousedown=e=>{
        if(!isLogin) return;
        e.stopPropagation();
        saveHistory();
        resizing=box;
        sx=e.clientX; sy=e.clientY;
        sw=box.offsetWidth; sh=box.offsetHeight;
    };
}

/* PAN (CHỈ KHI ZOOM) */
let panning=false,px,py;
document.addEventListener("mousedown",e=>{
    if(scale<=1) return;
    if(e.target.closest(".box") || e.target.closest(".line")) return;

    panning=true;
    px=e.clientX; py=e.clientY;
});
document.addEventListener("mousemove",e=>{
    if(!panning) return;
    offsetX+=e.clientX-px;
    offsetY+=e.clientY-py;
    px=e.clientX; py=e.clientY;
    updateTransform();
});
document.addEventListener("mouseup",()=>panning=false);

/* TRANSFORM */
function updateTransform(){
    container.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale})`;
}

/* ZOOM CTRL */
document.addEventListener("wheel",e=>{
    if(!e.ctrlKey) return;
    e.preventDefault();

    let newScale=scale+(e.deltaY<0?0.1:-0.1);

    if(newScale<=1){
        scale=1; offsetX=0; offsetY=0;
        updateTransform();
        return;
    }

    scale=newScale;
    updateTransform();
},{passive:false});

/* SAVE */
saveBtn.onclick=()=>{
    localStorage.setItem("familyTree",container.innerHTML);
};

/* LINE TOOL */
const lineModeCheckbox = document.getElementById("lineMode");
const lineOptions = document.getElementById("lineOptions");
const lineColorInput = document.getElementById("lineColor");
const lineWidthInput = document.getElementById("lineWidth");
const drawLineBtn = document.getElementById("drawLineBtn");

lineModeCheckbox.onchange=()=>{
    lineMode=lineModeCheckbox.checked;
    lineOptions.style.display=lineMode ? "block" : "none";
};

drawLineBtn.onclick=()=>{
    drawLineMode=!drawLineMode;
    drawLineBtn.style.backgroundColor=drawLineMode ? "#ddd" : "";
};

/* Vẽ line một lần */
container.addEventListener("mousedown", e=>{
    if(!isLogin) return;
    if(!drawLineMode) return;
    if(e.target.closest(".box")) return;

    saveHistory();
    startX=e.clientX/scale - offsetX/scale;
    startY=e.clientY/scale - offsetY/scale;

    const line=document.createElement("div");
    line.className="line";
    line.style.left=startX+"px";
    line.style.top=startY+"px";
    line.style.width="0px";
    line.style.height="2px";
    line.style.backgroundColor=lineColorInput.value;
    line.style.borderTop=`${lineWidthInput.value}px solid ${lineColorInput.value}`;
    container.appendChild(line);
    currentLine=line;

    function onMouseMove(e){
        const x2=e.clientX/scale - offsetX/scale;
        const y2=e.clientY/scale - offsetY/scale;
        const dx=x2-startX;
        const dy=y2-startY;
        const length=Math.sqrt(dx*dx + dy*dy);
        const angle=Math.atan2(dy, dx) * 180/Math.PI;
        currentLine.style.width=length+"px";
        currentLine.style.transform=`rotate(${angle}deg)`;
        currentLine.style.transformOrigin="0 0";
    }

    function onMouseUp(e){
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", onMouseUp);
        enableLineMoveDelete(currentLine);
        currentLine=null;
    }

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
});

/* Di chuyển và xóa line */
function enableLineMoveDelete(line){
    line.onclick=e=>{
        e.stopPropagation();
        document.querySelectorAll(".line").forEach(l=>l.classList.remove("active"));
        line.classList.add("active");
        currentLine=line;
    };

    let draggingLine=false, dxLine, dyLine;

    line.addEventListener("mousedown", e=>{
        if(!isLogin) return;
        e.stopPropagation();
        draggingLine=true;
        dxLine=e.clientX/scale - offsetX/scale - parseFloat(line.style.left);
        dyLine=e.clientY/scale - offsetY/scale - parseFloat(line.style.top);
    });

    document.addEventListener("mousemove", e=>{
        if(!draggingLine) return;
        line.style.left=(e.clientX/scale - offsetX/scale - dxLine)+"px";
        line.style.top=(e.clientY/scale - offsetY/scale - dyLine)+"px";
    });

    document.addEventListener("mouseup", ()=>draggingLine=false);

    document.addEventListener("keydown", e=>{
        if(e.key==="Delete" && line.classList.contains("active")){
            saveHistory();
            line.remove();
        }
    });
}
</script>

</body>
</html>

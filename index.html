<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

#container {
    position: relative;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: move;
    resize: both;
    overflow: hidden;
}

/* BUTTON */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
}
#logoutBtn { display: none; }

/* LOGIN BOX */
#loginBox {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    display: none;
    z-index: 9999;
}

/* TOOL */
#tool {
    position: fixed;
    top: 50px;
    right: 10px;
    background: white;
    padding: 10px;
    display: none;
    z-index: 9999;
    width: 220px;
}

#tool input, #tool select {
    width: 100%;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="loginBox">
    <input id="user" placeholder="user"><br><br>
    <input id="pass" type="password" placeholder="pass"><br><br>
    <button id="okBtn">OK</button>
</div>

<div id="tool">
    <button id="addBtn">+ Add Box</button><br><br>

    Text:
    <input id="text">

    Font:
    <select id="font">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
    </select>

    Font Size:
    <input id="size" type="number" value="16">

    Text Color:
    <input id="textColor" type="color">

    Background:
    <input id="bgColor" type="color">

    Border Color:
    <input id="borderColor" type="color">

    Border Width:
    <input id="borderWidth" type="number" value="2">
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = false;
let currentBox = null;

/* DOM */
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const loginBox = document.getElementById("loginBox");
const tool = document.getElementById("tool");
const container = document.getElementById("container");

/* INPUT */
const textInput = document.getElementById("text");
const fontInput = document.getElementById("font");
const sizeInput = document.getElementById("size");
const textColorInput = document.getElementById("textColor");
const bgInput = document.getElementById("bgColor");
const borderColorInput = document.getElementById("borderColor");
const borderWidthInput = document.getElementById("borderWidth");

/* LOGIN */
loginBtn.onclick = () => loginBox.style.display = "block";

okBtn.onclick = () => {
    if (user.value === "a" && pass.value === "1") {
        isLogin = true;
        loginBox.style.display = "none";
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        tool.style.display = "block";
    } else alert("Wrong");
};

logoutBtn.onclick = () => {
    isLogin = false;
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    tool.style.display = "none";
};

/* CREATE BOX */
addBtn.onclick = () => {
    const box = document.createElement("div");
    box.className = "box";
    box.innerText = "New";
    box.style.top = "100px";
    box.style.left = "100px";

    container.appendChild(box);
    enableDrag(box);

    box.onclick = () => currentBox = box;
};

/* ===== REALTIME ===== */

/* TEXT */
textInput.oninput = () => {
    if (!currentBox) return;
    currentBox.innerText = textInput.value;
};

fontInput.oninput = () => {
    if (!currentBox) return;
    currentBox.style.fontFamily = fontInput.value;
};

sizeInput.oninput = () => {
    if (!currentBox) return;
    currentBox.style.fontSize = sizeInput.value + "px";
};

/* COLOR PREVIEW */
textColorInput.oninput = () => {
    if (!currentBox) return;
    currentBox.style.color = textColorInput.value;
};

bgInput.oninput = () => {
    if (!currentBox) return;
    currentBox.style.background = bgInput.value;
};

borderColorInput.oninput = () => {
    if (!currentBox) return;
    currentBox.style.border = borderWidthInput.value + "px solid " + borderColorInput.value;
};

borderWidthInput.oninput = () => {
    if (!currentBox) return;
    currentBox.style.border = borderWidthInput.value + "px solid " + borderColorInput.value;
};

/* DOUBLE CLICK = CONFIRM (lưu lại) */
bgInput.ondblclick = () => {
    if (!currentBox) return;
    currentBox.dataset.bg = bgInput.value;
};

borderColorInput.ondblclick = () => {
    if (!currentBox) return;
    currentBox.dataset.border = borderColorInput.value;
};

/* DRAG */
function enableDrag(box){
    let dragging = false;
    let offsetX, offsetY;

    box.addEventListener("mousedown", (e)=>{
        if(!isLogin) return;
        dragging = true;
        offsetX = e.clientX - box.offsetLeft;
        offsetY = e.clientY - box.offsetTop;
    });

    document.addEventListener("mousemove", (e)=>{
        if(!dragging) return;
        box.style.left = (e.clientX - offsetX) + "px";
        box.style.top = (e.clientY - offsetY) + "px";
    });

    document.addEventListener("mouseup", ()=>{
        dragging = false;
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gia phả</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
}

#container {
    width: 100vw;
    height: 100vh;
    cursor: grab;
    overflow: hidden;
}

img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    transform-origin: center;
    user-select: none;
}
</style>
</head>

<body>

<div id="container">
    <img id="img" src="Background.jpg">
</div>

<script>
let scale = 1;
let posX = 0;
let posY = 0;

let isDragging = false;
let startX = 0;
let startY = 0;

const img = document.getElementById("img");
const container = document.getElementById("container");

// zoom
window.addEventListener("wheel", function(e) {
    if (e.ctrlKey) {
        e.preventDefault();

        if (e.deltaY < 0) {
            scale += 0.1;
        } else {
            scale -= 0.1;
        }

        scale = Math.max(1, Math.min(scale, 5));

        update();
    }
}, { passive: false });

// bắt đầu kéo
container.addEventListener("mousedown", function(e) {
    if (scale > 1) {
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        container.style.cursor = "grabbing";
    }
});

// kết thúc kéo
window.addEventListener("mouseup", function() {
    isDragging = false;
    container.style.cursor = "grab";
});

// di chuyển
window.addEventListener("mousemove", function(e) {
    if (isDragging) {
        posX += e.clientX - startX;
        posY += e.clientY - startY;

        startX = e.clientX;
        startY = e.clientY;

        update();
    }
});

// cập nhật transform
function update() {
    img.style.transform =
        `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
}
</script>

</body>
</html>

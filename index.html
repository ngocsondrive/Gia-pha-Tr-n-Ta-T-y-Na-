<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>

<style>
body { margin:0; background:#000; font-family:Arial; overflow:auto; cursor:grab; }
body:active { cursor:grabbing; }

#container { position:absolute; transform-origin:top left; }
img { width:100%; }

.box {
    position:absolute; width:150px; height:70px;
    background:white; border:2px solid black;
    border-radius:10px; display:flex;
    align-items:center; justify-content:center;
    cursor:move;
}
.box.active { outline:3px dashed red; }

.resize-handle {
    position:absolute; right:-8px; bottom:-8px;
    width:18px; height:18px; cursor:nwse-resize;
}

#tool {
    position:fixed; top:10px; right:10px; width:250px;
    background:white; padding:10px; z-index:9999;
    border:2px solid black; border-radius:5px;
    display:none;
}

#toggleTool { position:fixed; top:10px; right:10px; display:none; z-index:9999; }
#loginBox { position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); display:none; background:white; padding:10px; z-index:9999; }
#loginBtn,#logoutBtn { position:fixed; top:10px; right:10px; z-index:9999; }
#logoutBtn { display:none; }

.lineCursor { cursor:crosshair; }
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<button id="toggleTool">☰</button>

<div id="loginBox">
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button id="okBtn">OK</button>
</div>

<div id="tool">
<h3>Tool Box</h3>
<button id="collapseBtn">− Thu nhỏ</button>
<button id="addBtn">+ Add Box</button>
<button id="saveBtn">💾 Save</button>

Text:<input id="text">
Font Size:<input id="size" type="number" value="16">
Border Size:<input id="borderSize" type="number" value="2">
Border Color:<input id="borderColor" type="color">
Background:<input id="bgColor" type="color">
Text Color:<input id="textColor" type="color">

<button id="drawLineBtn">✏️ Vẽ Line</button>
Line Color: <input type="color" id="lineColor" value="#ff0000">
Line Width: <input type="number" id="lineWidth" value="3">
</div>

<div id="container">
<img src="Background.jpg">
</div>

<script>
let isLogin=false,currentBox=null,scale=1,offsetX=0,offsetY=0,historyStack=[];
const container=document.getElementById("container");

/* LOGIN */
loginBtn.onclick=()=>loginBox.style.display="block";
okBtn.onclick=()=>{
    if(user.value==="a"&&pass.value==="1"){
        isLogin=true;
        loginBox.style.display="none";
        loginBtn.style.display="none";
        logoutBtn.style.display="block";
        tool.style.display="block";
    }
};
logoutBtn.onclick=()=>{
    isLogin=false;
    loginBtn.style.display="block";
    logoutBtn.style.display="none";
    tool.style.display="none";
    toggleTool.style.display="none";
};

/* TOOL */
collapseBtn.onclick=()=>{ tool.style.display="none"; toggleTool.style.display="block"; };
toggleTool.onclick=()=>{ tool.style.display="block"; toggleTool.style.display="none"; };

/* ADD BOX */
addBtn.onclick=()=>{
    if(!isLogin) return;
    const box=document.createElement("div");
    box.className="box";
    box.innerText="New";
    box.style.top="100px";
    box.style.left="100px";

    const handle=document.createElement("div");
    handle.className="resize-handle";
    box.appendChild(handle);

    container.appendChild(box);
    enable(box);
};

/* SELECT */
function selectBox(box){
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    box.classList.add("active");
    currentBox=box;
    text.value=box.innerText;
    size.value=parseInt(getComputedStyle(box).fontSize);
}

/* CLICK OUT */
document.addEventListener("click",(e)=>{
    if(e.target.closest(".box")) return;
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    currentBox=null;
});

/* UPDATE */
text.oninput=()=>{ if(currentBox) currentBox.innerText=text.value; };
size.oninput=()=>{ if(currentBox) currentBox.style.fontSize=size.value+"px"; };
borderSize.oninput=()=>{ if(currentBox) currentBox.style.borderWidth=borderSize.value+"px"; };
borderColor.oninput=()=>{ if(currentBox) currentBox.style.borderColor=borderColor.value; };
bgColor.oninput=()=>{ if(currentBox) currentBox.style.backgroundColor=bgColor.value; };
textColor.oninput=()=>{ if(currentBox) currentBox.style.color=textColor.value; };

/* DRAG */
let dragging=null,dx,dy;
document.addEventListener("mousemove",e=>{
    if(!dragging) return;
    dragging.style.left=(e.clientX/scale-dx)+"px";
    dragging.style.top=(e.clientY/scale-dy)+"px";
});
document.addEventListener("mouseup",()=>dragging=null);

function enable(box){
    const handle=box.querySelector(".resize-handle");

    box.onclick=e=>{ e.stopPropagation(); selectBox(box); };

    box.onmousedown=e=>{
        if(!isLogin) return;
        if(e.target.classList.contains("resize-handle")) return;
        dragging=box;
        dx=e.clientX/scale-box.offsetLeft;
        dy=e.clientY/scale-box.offsetTop;
    };

    handle.onmousedown=e=>{
        e.stopPropagation();
        let startX=e.clientX, startY=e.clientY;
        let w=box.offsetWidth, h=box.offsetHeight;

        function move(ev){
            box.style.width=(w+(ev.clientX-startX))+"px";
            box.style.height=(h+(ev.clientY-startY))+"px";
        }
        function up(){
            document.removeEventListener("mousemove",move);
            document.removeEventListener("mouseup",up);
        }
        document.addEventListener("mousemove",move);
        document.addEventListener("mouseup",up);
    };
}

/* ZOOM */
document.addEventListener("wheel",e=>{
    if(!e.ctrlKey) return;
    e.preventDefault();
    scale+=e.deltaY<0?0.1:-0.1;
    if(scale<1) scale=1;
    container.style.transform=`scale(${scale})`;
},{passive:false});

/* ================== LINE (LeaderLine) ================== */

let drawLineMode=false;
let startPoint=null;
let tempLine=null;
let lines=[];

drawLineBtn.onclick=()=>{
    if(!isLogin) return;
    drawLineMode=true;
    document.body.classList.add("lineCursor");
};

function createPoint(x,y){
    const p=document.createElement("div");
    p.style.position="absolute";
    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.width="1px";
    p.style.height="1px";
    container.appendChild(p);
    return p;
}

container.addEventListener("mousedown",e=>{
    if(!drawLineMode) return;
    if(e.target.closest(".box")) return;

    let x=e.clientX/scale;
    let y=e.clientY/scale;

    startPoint=createPoint(x,y);

    tempLine=new LeaderLine(startPoint,startPoint,{
        color:lineColor.value,
        size:lineWidth.value
    });

    function move(ev){
        let x2=ev.clientX/scale;
        let y2=ev.clientY/scale;

        if(Math.abs(x2-x)>Math.abs(y2-y)) y2=y;
        else x2=x;

        let end=createPoint(x2,y2);
        tempLine.setOptions({end:end});
        tempLine.position();
    }

    function up(ev){
        drawLineMode=false;
        document.body.classList.remove("lineCursor");

        let x2=ev.clientX/scale;
        let y2=ev.clientY/scale;

        if(Math.abs(x2-x)>Math.abs(y2-y)) y2=y;
        else x2=x;

        let end=createPoint(x2,y2);

        let line=new LeaderLine(startPoint,end,{
            color:lineColor.value,
            size:lineWidth.value
        });

        lines.push(line);

        container.removeEventListener("mousemove",move);
        container.removeEventListener("mouseup",up);
    }

    container.addEventListener("mousemove",move);
    container.addEventListener("mouseup",up);
});

lineColor.oninput=()=>lines.forEach(l=>l.setOptions({color:lineColor.value}));
lineWidth.oninput=()=>lines.forEach(l=>l.setOptions({size:lineWidth.value}));

</script>
</body>
</html>

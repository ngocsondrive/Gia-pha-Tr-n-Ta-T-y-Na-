<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: hidden;
    cursor: grab;
}
body:active {
    cursor: grabbing;
}

#container {
    position: absolute;
    transform-origin: top left;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: move;
    overflow: visible;
}

/* HANDLE (ẩn → hover mới hiện) */
.resize-handle {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 18px;
    height: 18px;
    cursor: nwse-resize;
    background: none;
    opacity: 0;
    transition: 0.2s;
}

.box:hover .resize-handle {
    opacity: 1;
}

.resize-handle::before {
    content: "";
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 10px;
    height: 10px;
    border-right: 2px solid black;
    border-bottom: 2px solid black;
}

/* BUTTON */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
}
#logoutBtn { display: none; }

/* LOGIN */
#loginBox {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    display: none;
    z-index: 9999;
}

/* TOOL */
#tool {
    position: fixed;
    top: 50px;
    right: 10px;
    background: white;
    padding: 10px;
    display: none;
    z-index: 9999;
    width: 220px;
}

#tool input, #tool select {
    width: 100%;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="loginBox">
    <input id="user" placeholder="user"><br><br>
    <input id="pass" type="password" placeholder="pass"><br><br>
    <button id="okBtn">OK</button>
</div>

<div id="tool">
    <button id="addBtn">+ Add Box</button><br><br>

    Text:
    <input id="text">

    Font:
    <select id="font">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
    </select>

    Font Size:
    <input id="size" type="number" value="16">

    Text Color:
    <input id="textColor" type="color">

    Background:
    <input id="bgColor" type="color">

    Border Color:
    <input id="borderColor" type="color">

    Border Width:
    <input id="borderWidth" type="number" value="2">
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = false;
let currentBox = null;

let scale = 1;
const MIN_SCALE = 1;
const MAX_SCALE = 3;

let offsetX = 0;
let offsetY = 0;

const container = document.getElementById("container");

/* LOGIN */
loginBtn.onclick = () => loginBox.style.display = "block";

okBtn.onclick = () => {
    if (user.value === "a" && pass.value === "1") {
        isLogin = true;
        loginBox.style.display = "none";
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        tool.style.display = "block";
    } else alert("Wrong");
};

logoutBtn.onclick = () => {
    isLogin = false;
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    tool.style.display = "none";
};

/* CREATE BOX */
addBtn.onclick = () => {
    const box = document.createElement("div");
    box.className = "box";
    box.innerText = "New";
    box.style.top = "100px";
    box.style.left = "100px";

    const handle = document.createElement("div");
    handle.className = "resize-handle";
    box.appendChild(handle);

    container.appendChild(box);

    enableDrag(box);
    enableResize(box, handle);

    box.onclick = () => currentBox = box;
};

/* REALTIME */
text.oninput = () => currentBox && (currentBox.innerText = text.value);
font.oninput = () => currentBox && (currentBox.style.fontFamily = font.value);
size.oninput = () => currentBox && (currentBox.style.fontSize = size.value + "px");
textColor.oninput = () => currentBox && (currentBox.style.color = textColor.value);
bgColor.oninput = () => currentBox && (currentBox.style.background = bgColor.value);
borderColor.oninput = () => currentBox && (currentBox.style.border = borderWidth.value + "px solid " + borderColor.value);
borderWidth.oninput = () => currentBox && (currentBox.style.border = borderWidth.value + "px solid " + borderColor.value);

/* DRAG BOX */
function enableDrag(box){
    let dragging = false, dx, dy;

    box.addEventListener("mousedown", (e)=>{
        if(!isLogin) return;
        if(e.target.classList.contains("resize-handle")) return;

        dragging = true;
        dx = e.clientX/scale - box.offsetLeft;
        dy = e.clientY/scale - box.offsetTop;
    });

    document.addEventListener("mousemove", (e)=>{
        if(!dragging) return;
        box.style.left = (e.clientX/scale - dx) + "px";
        box.style.top = (e.clientY/scale - dy) + "px";
    });

    document.addEventListener("mouseup", ()=> dragging = false);
}

/* RESIZE */
function enableResize(box, handle){
    let resizing = false, startX, startY, w, h;

    handle.addEventListener("mousedown", (e)=>{
        if(!isLogin) return;
        e.stopPropagation();

        resizing = true;
        startX = e.clientX;
        startY = e.clientY;
        w = box.offsetWidth;
        h = box.offsetHeight;
    });

    document.addEventListener("mousemove", (e)=>{
        if(!resizing) return;

        let dx = (e.clientX - startX)/scale;
        let dy = (e.clientY - startY)/scale;

        box.style.width = (w + dx) + "px";
        box.style.height = (h + dy) + "px";
    });

    document.addEventListener("mouseup", ()=> resizing = false);
}

/* AUTO CENTER */
function updateTransform(){
    const img = container.querySelector("img");

    const w = img.offsetWidth * scale;
    const h = img.offsetHeight * scale;

    const screenW = window.innerWidth;
    const screenH = window.innerHeight;

    if (scale === MIN_SCALE) {
        offsetX = (screenW - w) / 2;
        offsetY = (screenH - h) / 2;
    }

    container.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

/* ZOOM */
window.addEventListener("wheel", (e)=>{
    if(e.ctrlKey){
        e.preventDefault();

        if(e.deltaY < 0) scale += 0.1;
        else scale -= 0.1;

        scale = Math.max(MIN_SCALE, Math.min(scale, MAX_SCALE));

        updateTransform();
    }
}, { passive:false });

/* PAN */
let panning = false, startX, startY;

document.addEventListener("mousedown", (e)=>{
    if(e.button !== 0) return;
    if(e.target.closest(".box")) return;

    panning = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mousemove", (e)=>{
    if(!panning) return;

    offsetX += (e.clientX - startX);
    offsetY += (e.clientY - startY);

    startX = e.clientX;
    startY = e.clientY;

    updateTransform();
});

document.addEventListener("mouseup", ()=> panning = false);

</script>

</body>
</html>

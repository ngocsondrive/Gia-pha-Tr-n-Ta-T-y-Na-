<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

#container {
    position: relative;
    text-align: center;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    top: 200px;
    left: 300px;
    width: 120px;
    height: 60px;
    background: white;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: default;
}

/* LOGIN BUTTON */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 8px 12px;
    border: none;
    background: white;
    cursor: pointer;
    border-radius: 5px;
}

/* LOGOUT hidden */
#logoutBtn {
    display: none;
}

/* LOGIN POPUP */
#loginBox {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    display: none;
}

#loginBox input {
    display: block;
    margin: 10px auto;
    padding: 5px;
}
</style>
</head>

<body>

<button id="loginBtn" onclick="showLogin()">Login</button>
<button id="logoutBtn" onclick="logout()">Logout</button>

<div id="loginBox">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">OK</button>
</div>

<div id="container">
    <img src="Background.jpg">
    <div class="box" id="box">Tran Van A</div>
</div>

<script>
let isLogin = false;

/* SHOW LOGIN */
function showLogin() {
    document.getElementById("loginBox").style.display = "block";
}

/* LOGIN */
function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (u === "a" && p === "1") {
        isLogin = true;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("loginBtn").style.display = "none";
        document.getElementById("logoutBtn").style.display = "block";
        document.getElementById("box").style.cursor = "grab";
    } else {
        alert("Wrong account");
    }
}

/* LOGOUT */
function logout() {
    isLogin = false;
    document.getElementById("loginBtn").style.display = "block";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("box").style.cursor = "default";
}

/* DRAG */
const box = document.getElementById("box");

let isDragging = false;
let offsetX, offsetY;

box.addEventListener("mousedown", function(e) {
    if (!isLogin) return;

    isDragging = true;
    offsetX = e.offsetX;
    offsetY = e.offsetY;
});

document.addEventListener("mousemove", function(e) {
    if (!isDragging) return;

    box.style.left = (e.pageX - offsetX) + "px";
    box.style.top = (e.pageY - offsetY) + "px";
});

document.addEventListener("mouseup", function() {
    isDragging = false;
});
</script>

</body>
</html>

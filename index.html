<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    overflow: auto;
    background-color: #000;
}

#container {
    position: relative;
    text-align: center;
}

img {
    width: 100%;
    height: auto;
    display: block;
    transform-origin: center center;
}

/* TEXT BOX */
#box {
    position: absolute;
    top: 200px;
    left: 300px;
    width: 120px;
    height: 60px;
    background: white;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div id="container">
    <img id="image" src="Background.jpg">
    <div id="box">Tran Van A</div>
</div>

<script>
let scale = 1;
const container = document.getElementById("container");

window.addEventListener("wheel", function(e) {
    if (e.ctrlKey) {
        e.preventDefault();

        if (e.deltaY < 0) {
            scale += 0.1;
        } else {
            scale -= 0.1;
        }

        scale = Math.max(0.5, Math.min(scale, 5));

        container.style.transform = "scale(" + scale + ")";
    }
}, { passive: false });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: auto;
    cursor: grab;
}
body:active { cursor: grabbing; }

#container {
    position: absolute;
    transform-origin: top left;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: move;
    overflow: visible;
}

.box.active {
    outline: 3px dashed red;
}

/* HANDLE */
.resize-handle {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 18px;
    height: 18px;
    cursor: nwse-resize;
    opacity: 0;
}
.box:hover .resize-handle { opacity: 1; }

.resize-handle::before {
    content: "";
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 10px;
    height: 10px;
    border-right: 2px solid black;
    border-bottom: 2px solid black;
}

/* UI */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
}
#logoutBtn { display: none; }

#loginBox {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 20px;
    display: none;
    z-index: 9999;
}

#tool {
    position: fixed;
    top: 50px;
    right: 10px;
    background: white;
    padding: 10px;
    display: none;
    z-index: 9999;
    width: 220px;
}

#tool button, #tool input {
    width: 100%;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="loginBox">
    <input id="user" placeholder="user"><br><br>
    <input id="pass" type="password" placeholder="pass"><br><br>
    <button id="okBtn">OK</button>
</div>

<div id="tool">
    <button id="addBtn">+ Add Box</button>
    <button id="saveBtn">💾 Save</button>

    Text:
    <input id="text">

    Font Size:
    <input id="size" type="number" value="16">
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = false;
let currentBox = null;
let historyStack = [];

let scale = 1;
let offsetX = 0;
let offsetY = 0;

const container = document.getElementById("container");

/* AUTO LOAD */
window.onload = ()=>{
    const data = localStorage.getItem("familyTree");
    if(data){
        container.innerHTML = data;
        rebind();
    }
};

/* LOGIN */
loginBtn.onclick = () => loginBox.style.display = "block";

okBtn.onclick = () => {
    if (user.value === "a" && pass.value === "1") {
        isLogin = true;
        loginBox.style.display = "none";
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        tool.style.display = "block";
    } else alert("Wrong");
};

logoutBtn.onclick = () => {
    isLogin = false;
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    tool.style.display = "none";
};

/* ADD BOX */
addBtn.onclick = () => {
    if(!isLogin) return;

    const box = document.createElement("div");
    box.className = "box";
    box.innerText = "New";
    box.style.top = "100px";
    box.style.left = "100px";

    const handle = document.createElement("div");
    handle.className = "resize-handle";
    box.appendChild(handle);

    container.appendChild(box);

    enableDrag(box);
    enableResize(box, handle);

    box.onclick = (e)=>{
        e.stopPropagation();
        selectBox(box);
    };
};

/* SELECT */
function selectBox(box){
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    box.classList.add("active");
    currentBox = box;

    text.value = box.innerText;
    size.value = parseInt(window.getComputedStyle(box).fontSize);
}

/* UPDATE TEXT */
text.oninput = ()=>{
    if(currentBox) currentBox.innerText = text.value;
};

/* UPDATE SIZE */
size.oninput = ()=>{
    if(currentBox) currentBox.style.fontSize = size.value + "px";
};

/* DELETE */
document.addEventListener("keydown", (e)=>{
    if(!isLogin) return;

    if(e.key === "Delete" && currentBox){
        currentBox.remove();
        currentBox = null;
    }
});

/* SAVE */
saveBtn.onclick = () => {
    localStorage.setItem("familyTree", container.innerHTML);
};

/* REBIND */
function rebind(){
    document.querySelectorAll(".box").forEach(box=>{
        const handle = box.querySelector(".resize-handle");

        enableDrag(box);
        enableResize(box, handle);

        box.onclick = (e)=>{
            e.stopPropagation();
            selectBox(box);
        };
    });
}

/* DRAG */
let draggingBox = null;
let dragDX = 0;
let dragDY = 0;

document.addEventListener("mousemove", (e)=>{
    if(!draggingBox) return;

    draggingBox.style.left = (e.clientX/scale - dragDX) + "px";
    draggingBox.style.top = (e.clientY/scale - dragDY) + "px";
});

document.addEventListener("mouseup", ()=>{
    draggingBox = null;
});

function enableDrag(box){
    box.addEventListener("mousedown", (e)=>{
        if(!isLogin) return;
        if(e.target.classList.contains("resize-handle")) return;

        draggingBox = box;
        dragDX = e.clientX/scale - box.offsetLeft;
        dragDY = e.clientY/scale - box.offsetTop;
    });
}

/* RESIZE */
let resizingBox = null;
let startX, startY, startW, startH;

document.addEventListener("mousemove", (e)=>{
    if(!resizingBox) return;

    let dx = (e.clientX - startX)/scale;
    let dy = (e.clientY - startY)/scale;

    resizingBox.style.width = (startW + dx) + "px";
    resizingBox.style.height = (startH + dy) + "px";
});

document.addEventListener("mouseup", ()=>{
    resizingBox = null;
});

function enableResize(box, handle){
    handle.addEventListener("mousedown", (e)=>{
        if(!isLogin) return;
        e.stopPropagation();

        resizingBox = box;
        startX = e.clientX;
        startY = e.clientY;
        startW = box.offsetWidth;
        startH = box.offsetHeight;
    });
}

/* PAN */
let panning = false;
let startPX, startPY;

document.addEventListener("mousedown", (e)=>{
    if(e.button !== 0) return;
    if(e.target.closest(".box")) return;

    panning = true;
    startPX = e.clientX;
    startPY = e.clientY;
});

document.addEventListener("mousemove", (e)=>{
    if(!panning) return;

    offsetX += (e.clientX - startPX);
    offsetY += (e.clientY - startPY);

    startPX = e.clientX;
    startPY = e.clientY;

    updateTransform();
});

document.addEventListener("mouseup", ()=> panning = false);

/* TRANSFORM */
function updateTransform(){
    container.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

/* ZOOM CTRL + WHEEL */
document.addEventListener("wheel", (e)=>{
    if(!e.ctrlKey) return;

    e.preventDefault();

    const zoomSpeed = 0.1;
    const rect = container.getBoundingClientRect();

    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    let newScale = scale;

    if(e.deltaY < 0){
        newScale += zoomSpeed;
    } else {
        newScale -= zoomSpeed;
    }

    if(newScale <= 1){
        scale = 1;
        offsetX = 0;
        offsetY = 0;
        updateTransform();
        return;
    }

    offsetX -= (mouseX / scale) * (newScale - scale);
    offsetY -= (mouseY / scale) * (newScale - scale);

    scale = newScale;

    updateTransform();
}, { passive: false });

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

#container {
    position: relative;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    user-select: none;
}

/* BUTTON */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
}

#logoutBtn { display: none; }

/* TOOL PANEL */
#tool {
    position: fixed;
    top: 50px;
    right: 10px;
    background: white;
    padding: 10px;
    display: none;
    z-index: 9999;
    width: 200px;
}

#tool input, #tool select {
    width: 100%;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="tool">
    <button onclick="createBox()">+ Add Box</button><br><br>

    Text:
    <input id="text">

    Font Size:
    <input id="size" type="number" value="16">

    Text Color:
    <input id="color" type="color">

    Background:
    <input id="bg" type="color">

    Border Color:
    <input id="borderColor" type="color">

    Border Width:
    <input id="borderWidth" type="number" value="2">

    Radius:
    <input id="radius" type="number" value="10">

    Font:
    <select id="font">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
    </select>
</div>

<div id="loginBox" style="display:none; position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px;">
    <input id="user" placeholder="user"><br><br>
    <input id="pass" type="password" placeholder="pass"><br><br>
    <button onclick="login()">OK</button>
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = false;
let currentBox = null;

/* LOGIN */
document.getElementById("loginBtn").onclick = () => {
    document.getElementById("loginBox").style.display = "block";
};

function login(){
    if(user.value==="a" && pass.value==="1"){
        isLogin = true;
        loginBox.style.display="none";
        loginBtn.style.display="none";
        logoutBtn.style.display="block";
        tool.style.display="block";
    }else{
        alert("wrong");
    }
}

logoutBtn.onclick = ()=>{
    isLogin=false;
    loginBtn.style.display="block";
    logoutBtn.style.display="none";
    tool.style.display="none";
}

/* CREATE BOX */
function createBox(){
    const box = document.createElement("div");
    box.className="box";
    box.style.top="100px";
    box.style.left="100px";

    box.innerText = text.value;

    applyStyle(box);

    container.appendChild(box);

    enableDrag(box);

    box.onclick = ()=>{
        currentBox = box;
    }
}

/* APPLY STYLE */
function applyStyle(box){
    box.style.background = bg.value;
    box.style.borderColor = borderColor.value;
    box.style.borderWidth = borderWidth.value + "px";
    box.style.borderStyle = "solid";
    box.style.borderRadius = radius.value + "px";

    box.style.color = color.value;
    box.style.fontSize = size.value + "px";
    box.style.fontFamily = font.value;
}

/* UPDATE REALTIME */
document.querySelectorAll("#tool input, #tool select").forEach(el=>{
    el.oninput = ()=>{
        if(currentBox) applyStyle(currentBox), currentBox.innerText = text.value;
    }
});

/* DRAG */
function enableDrag(box){
    let dragging=false, offsetX, offsetY;

    box.onmousedown = (e)=>{
        if(!isLogin) return;
        dragging=true;
        offsetX = e.clientX - box.offsetLeft;
        offsetY = e.clientY - box.offsetTop;
    };

    document.onmousemove = (e)=>{
        if(!dragging) return;
        box.style.left = (e.clientX - offsetX)+"px";
        box.style.top = (e.clientY - offsetY)+"px";
    };

    document.onmouseup = ()=>{
        dragging=false;
    };
}
</script>

</body>
</html>

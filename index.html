<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: auto;
    cursor: grab;
}
body:active {
    cursor: grabbing;
}

#container {
    position: absolute;
    transform-origin: top left;
}

img {
    width: 100%;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: move;
}
.box.active {
    outline: 3px dashed red;
}

.resize-handle {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 18px;
    height: 18px;
    cursor: nwse-resize;
}

/* LINE */
.line {
    position: absolute;
    pointer-events: auto;
}
.line.active {
    outline: 2px dashed yellow;
}

/* TOOLBOX */
#tool {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 250px;
    background: white;
    padding: 10px;
    z-index: 9999;
    border: 2px solid black;
    border-radius: 5px;
    display: none;
}

#tool h3 {
    margin: 0 0 5px 0;
    text-align: center;
}

#tool input,
#tool button,
#tool label {
    width: 100%;
    margin-bottom: 5px;
}

#toggleTool {
    position: fixed;
    top: 10px;
    right: 10px;
    display: none;
    z-index: 9999;
}

#loginBox {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    background: white;
    padding: 10px;
    z-index: 9999;
}

#loginBtn,
#logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
}

#logoutBtn {
    display: none;
}

.lineCursor {
    cursor: url('data:image/svg+xml;base64,PHN2ZyBoZWlnaHQ9IjMycHgiIHdpZHRoPSIzMnB4IiB2aWV3Qm94PSIwIDAgNjQgNjQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBvbHlnb24gcG9pbnRzPSIyOCA0IDMyIDMyIDM2IDQiIHN0cm9rZT0iIzAwMCIgc3Ryb2tlLXdpZHRoPSI0IiBmaWxsPSJub25lIi8+PC9zdmc+'), auto;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<button id="toggleTool">☰</button>

<div id="loginBox">
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <button id="okBtn">OK</button>
</div>

<div id="tool">
    <h3>Tool Box</h3>
    <button id="collapseBtn">− Thu nhỏ</button>
    <button id="addBtn">+ Add Box</button>
    <button id="saveBtn">💾 Save</button>

    Text:
    <input id="text">

    Font Size:
    <input id="size" type="number" value="16">

    Border Size:
    <input id="borderSize" type="number" value="2">

    Border Color:
    <input id="borderColor" type="color">

    Background:
    <input id="bgColor" type="color">

    Text Color:
    <input id="textColor" type="color">

    <button id="drawLineBtn">✏️ Vẽ Line</button>

    Line Color:
    <input type="color" id="lineColor" value="#ff0000">

    Line Width:
    <input type="number" id="lineWidth" value="3">
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = false;
let currentBox = null;
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let historyStack = [];

const container = document.getElementById("container");

/* AUTO LOAD */
window.onload = () => {
    const data = localStorage.getItem("familyTree");
    if (data) {
        container.innerHTML = data;
        rebind();
    }
};

/* LOGIN */
loginBtn.onclick = () => loginBox.style.display = "block";

okBtn.onclick = () => {
    if (user.value === "a" && pass.value === "1") {
        isLogin = true;
        loginBox.style.display = "none";
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        tool.style.display = "block";
    }
};

logoutBtn.onclick = () => {
    isLogin = false;
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    tool.style.display = "none";
    toggleTool.style.display = "none";
};

/* TOOL COLLAPSE */
collapseBtn.onclick = () => {
    tool.style.display = "none";
    toggleTool.style.display = "block";
};

toggleTool.onclick = () => {
    tool.style.display = "block";
    toggleTool.style.display = "none";
};

/* HISTORY */
function saveHistory() {
    historyStack.push(container.innerHTML);
    if (historyStack.length > 50) historyStack.shift();
}

function undo() {
    if (historyStack.length === 0) return;
    container.innerHTML = historyStack.pop();
    rebind();
}

document.addEventListener("keydown", e => {
    if (e.ctrlKey && e.key.toLowerCase() === "z") {
        undo();
    }
});

/* ADD BOX */
addBtn.onclick = () => {
    if (!isLogin) return;

    saveHistory();

    const box = document.createElement("div");
    box.className = "box";
    box.innerText = "New";
    box.style.top = "100px";
    box.style.left = "100px";

    const handle = document.createElement("div");
    handle.className = "resize-handle";

    box.appendChild(handle);
    container.appendChild(box);

    enable(box);
};

/* SELECT BOX */
function selectBox(box) {
    document.querySelectorAll(".box").forEach(b => b.classList.remove("active"));
    box.classList.add("active");

    currentBox = box;
    text.value = box.innerText;
    size.value = parseInt(getComputedStyle(box).fontSize);
}

/* CLICK OUTSIDE */
document.addEventListener("click", (e) => {
    if (e.target.closest(".box") || e.target.closest(".line")) return;

    document.querySelectorAll(".box").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".line").forEach(l => l.classList.remove("active"));

    currentBox = null;
    selectedLine = null;
});

/* UPDATE BOX */
text.oninput = () => {
    if (currentBox) {
        saveHistory();
        currentBox.innerText = text.value;
    }
};

size.oninput = () => {
    if (currentBox) {
        saveHistory();
        currentBox.style.fontSize = size.value + "px";
    }
};

borderSize.oninput = () => {
    if (currentBox) {
        saveHistory();
        currentBox.style.borderWidth = borderSize.value + "px";
    }
};

borderColor.oninput = () => {
    if (currentBox) {
        saveHistory();
        currentBox.style.borderColor = borderColor.value;
    }
};

bgColor.oninput = () => {
    if (currentBox) {
        saveHistory();
        currentBox.style.backgroundColor = bgColor.value;
    }
};

textColor.oninput = () => {
    if (currentBox) {
        saveHistory();
        currentBox.style.color = textColor.value;
    }
};

/* ENABLE */
function enable(box) {
    const handle = box.querySelector(".resize-handle");

    box.onclick = e => {
        e.stopPropagation();
        selectBox(box);
    };

    enableDrag(box);
    enableResize(box, handle);
}

function rebind() {
    document.querySelectorAll(".box").forEach(enable);
    document.querySelectorAll(".line").forEach(enableLine);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
    overflow: auto;
    cursor: grab;
}
body:active {
    cursor: grabbing;
}

#container {
    position: absolute;
    transform-origin: top left;
}

img {
    width: 100%;
    display: block;
}

/* BOX */
.box {
    position: absolute;
    width: 150px;
    height: 70px;
    background: white;
    border: 2px solid black;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: move;
    overflow: visible;
}

/* ✅ box đang chọn */
.box.active {
    outline: 3px dashed red;
}

/* HANDLE */
.resize-handle {
    position: absolute;
    right: -8px;
    bottom: -8px;
    width: 18px;
    height: 18px;
    cursor: nwse-resize;
    background: none;
    opacity: 0;
}
.box:hover .resize-handle {
    opacity: 1;
}
.resize-handle::before {
    content: "";
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 10px;
    height: 10px;
    border-right: 2px solid black;
    border-bottom: 2px solid black;
}

/* BUTTON */
#loginBtn, #logoutBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 6px 10px;
    background: white;
    border: none;
    cursor: pointer;
    z-index: 9999;
}
#logoutBtn { display: none; }

/* TOOL */
#tool {
    position: fixed;
    top: 50px;
    right: 10px;
    background: white;
    padding: 10px;
    display: none;
    z-index: 9999;
    width: 220px;
}

#tool button {
    width: 100%;
    margin-bottom: 5px;
}

#tool input, #tool select {
    width: 100%;
    margin-bottom: 5px;
}
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="tool">
    <button id="addBtn">+ Add Box</button>
    <button id="saveBtn">💾 Save</button>
    <button id="loadBtn">📂 Load</button><br>

    Text:
    <input id="text">

    Font:
    <select id="font">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Courier New</option>
    </select>

    Font Size:
    <input id="size" type="number" value="16">
</div>

<div id="container">
    <img src="Background.jpg">
</div>

<script>
let isLogin = true;
let currentBox = null;
let historyStack = [];

let scale = 1;
const MIN_SCALE = 1;
let offsetX = 0;
let offsetY = 0;

const container = document.getElementById("container");

/* ADD BOX */
addBtn.onclick = () => {
    saveHistory();

    const box = document.createElement("div");
    box.className = "box";
    box.innerText = "New";
    box.style.top = "100px";
    box.style.left = "100px";

    const handle = document.createElement("div");
    handle.className = "resize-handle";
    box.appendChild(handle);

    container.appendChild(box);

    enableDrag(box);
    enableResize(box, handle);

    box.onclick = (e) => {
        e.stopPropagation();
        selectBox(box);
    };
};

/* SELECT */
function selectBox(box){
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    box.classList.add("active");
    currentBox = box;
}

/* CLICK NGOÀI */
document.addEventListener("click", ()=>{
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    currentBox = null;
});

/* DELETE */
document.addEventListener("keydown", (e)=>{
    if(e.key === "Delete" && currentBox){
        saveHistory();
        currentBox.remove();
        currentBox = null;
    }

    if(e.ctrlKey && e.key.toLowerCase() === "z"){
        undo();
    }
});

/* HISTORY */
function saveHistory(){
    historyStack.push(container.innerHTML);
}

function undo(){
    if(historyStack.length === 0) return;
    container.innerHTML = historyStack.pop();
    rebind();
}

/* SAVE */
saveBtn.onclick = () => {
    localStorage.setItem("familyTree", container.innerHTML);
};

/* LOAD */
loadBtn.onclick = () => {
    container.innerHTML = localStorage.getItem("familyTree") || "";
    rebind();
};

/* REBIND */
function rebind(){
    document.querySelectorAll(".box").forEach(box=>{
        const handle = box.querySelector(".resize-handle");

        enableDrag(box);
        enableResize(box, handle);

        box.onclick = (e)=>{
            e.stopPropagation();
            selectBox(box);
        };
    });
}

/* DRAG */
function enableDrag(box){
    let dragging = false, dx, dy;

    box.addEventListener("mousedown", (e)=>{
        if(e.target.classList.contains("resize-handle")) return;

        dragging = true;
        dx = e.clientX/scale - box.offsetLeft;
        dy = e.clientY/scale - box.offsetTop;
    });

    document.addEventListener("mousemove", (e)=>{
        if(!dragging) return;
        box.style.left = (e.clientX/scale - dx) + "px";
        box.style.top = (e.clientY/scale - dy) + "px";
    });

    document.addEventListener("mouseup", ()=> dragging = false);
}

/* RESIZE */
function enableResize(box, handle){
    let resizing = false, startX, startY, w, h;

    handle.addEventListener("mousedown", (e)=>{
        e.stopPropagation();

        resizing = true;
        startX = e.clientX;
        startY = e.clientY;
        w = box.offsetWidth;
        h = box.offsetHeight;
    });

    document.addEventListener("mousemove", (e)=>{
        if(!resizing) return;

        let dx = (e.clientX - startX)/scale;
        let dy = (e.clientY - startY)/scale;

        box.style.width = (w + dx) + "px";
        box.style.height = (h + dy) + "px";
    });

    document.addEventListener("mouseup", ()=> resizing = false);
}

/* PAN */
let panning = false;
let startX, startY;

document.addEventListener("mousedown", (e)=>{
    if(e.button !== 0) return;
    if(e.target.closest(".box")) return;

    panning = true;
    startX = e.clientX;
    startY = e.clientY;
});

document.addEventListener("mousemove", (e)=>{
    if(!panning) return;

    offsetX += (e.clientX - startX);
    offsetY += (e.clientY - startY);

    startX = e.clientX;
    startY = e.clientY;

    updateTransform();
});

document.addEventListener("mouseup", ()=> panning = false);

/* TRANSFORM */
function updateTransform(){
    container.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
</script>

</body>
</html>

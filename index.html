<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
    #container {
    position: relative;
}

#box {
    position: absolute;
    top: 200px;
    left: 300px;
    width: 120px;
    height: 60px;
    background: white;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
body {
    margin: 0;
    overflow: auto;
    background-color: #000;
}

#container {
    text-align: center;
}

img {
    <div id="box">Trần Lợi Vưu</div>
    width: 100%;
    height: auto;
    display: block;
    transform-origin: center center;
}
</style>
</head>

<body>

<div id="container">
    <img id="image" src="Background.jpg">
</div>

<script>
let scale = 1;
const image = document.getElementById("image");

window.addEventListener("wheel", function(e) {
    if (e.ctrlKey) {
        e.preventDefault();

        if (e.deltaY < 0) {
            scale += 0.1; // zoom in
        } else {
            scale -= 0.1; // zoom out
        }

        scale = Math.max(0.5, Math.min(scale, 5)); // zoom limit

        document.getElementById("container").style.transform = "scale(" + scale + ")";
    }
}, { passive: false });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Family Tree</title>

<style>
body { margin:0; background:#000; font-family:Arial; overflow:auto; cursor:grab; }
body:active { cursor:grabbing; }

#container { position:absolute; transform-origin:top left; }
img { width:100%; }

/* BOX */
.box {
    position:absolute;
    width:150px; height:70px;
    background:white;
    border:2px solid black;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:move;
}
.box.active { outline:3px dashed red; }

.resize-handle {
    position:absolute;
    right:-8px; bottom:-8px;
    width:18px; height:18px;
    cursor:nwse-resize;
}

/* TEXT riêng */
.box-text {
    pointer-events:none;
}

/* TOOL */
#tool {
    position:fixed; top:10px; right:10px; width:250px;
    background:white; padding:10px; z-index:9999;
    border:2px solid black; border-radius:5px;
    display:none;
}
#tool input,#tool button { width:100%; margin-bottom:5px; }

#loginBox {
    position:fixed; top:40%; left:50%;
    transform:translate(-50%,-50%);
    display:none; background:white; padding:10px;
    z-index:9999;
}

#loginBtn,#logoutBtn {
    position:fixed; top:10px; right:10px; z-index:9999;
}
#logoutBtn { display:none; }
</style>
</head>

<body>

<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>

<div id="loginBox">
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button id="okBtn">OK</button>
</div>

<div id="tool">
<h3>Tool Box</h3>
<button id="addBtn">+ Add Box</button>
<button id="saveBtn">💾 Save</button>

Text:<input id="text">
Font Size:<input id="size" type="number" value="16">
Border Size:<input id="borderSize" type="number" value="2">
Border Color:<input id="borderColor" type="color">
Background:<input id="bgColor" type="color">
Text Color:<input id="textColor" type="color">

<button id="drawLineBtn">✏️ Vẽ Line</button>
Line Color: <input type="color" id="lineColor" value="#ff0000">
Line Width: <input type="number" id="lineWidth" value="3">
</div>

<div id="container">
<img src="Background.jpg">
</div>

<script>
let isLogin=false,currentBox=null;
const container=document.getElementById("container");

/* LOGIN */
loginBtn.onclick=()=>loginBox.style.display="block";

okBtn.onclick=()=>{
    if(user.value==="a"&&pass.value==="1"){
        isLogin=true;
        loginBox.style.display="none";
        loginBtn.style.display="none";
        logoutBtn.style.display="block";
        tool.style.display="block";
    }
};

logoutBtn.onclick=()=>{
    isLogin=false;
    loginBtn.style.display="block";
    logoutBtn.style.display="none";
    tool.style.display="none";
};

/* ADD BOX */
addBtn.onclick=()=>{
    if(!isLogin) return;

    const box=document.createElement("div");
    box.className="box";
    box.style.top="100px";
    box.style.left="100px";

    const textDiv=document.createElement("div");
    textDiv.className="box-text";
    textDiv.innerText="New";

    const handle=document.createElement("div");
    handle.className="resize-handle";

    box.appendChild(textDiv);
    box.appendChild(handle);

    container.appendChild(box);
    enable(box);
};

/* SELECT */
function selectBox(box){
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    box.classList.add("active");
    currentBox=box;

    text.value=box.querySelector(".box-text").innerText;
}

/* CLICK OUT */
document.addEventListener("click",(e)=>{
    if(e.target.closest(".box")) return;
    document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
    currentBox=null;
});

/* UPDATE TEXT */
text.oninput=()=>{
    if(currentBox){
        currentBox.querySelector(".box-text").innerText=text.value;
    }
};

/* DELETE */
document.addEventListener("keydown",e=>{
    if(e.key==="Delete" && currentBox){
        currentBox.remove();
        currentBox=null;
    }
});

/* DRAG */
let dragging=null,dx,dy;

document.addEventListener("mousemove",e=>{
    if(!dragging) return;
    dragging.style.left=(e.clientX-dx)+"px";
    dragging.style.top=(e.clientY-dy)+"px";
});

document.addEventListener("mouseup",()=>dragging=null);

function enable(box){
    const handle=box.querySelector(".resize-handle");

    box.onclick=e=>{
        e.stopPropagation();
        selectBox(box);
    };

    box.onmousedown=e=>{
        if(!isLogin) return;
        if(e.target.classList.contains("resize-handle")) return;

        dragging=box;
        dx=e.clientX-box.offsetLeft;
        dy=e.clientY-box.offsetTop;
    };

    handle.onmousedown=e=>{
        e.stopPropagation();

        let sx=e.clientX, sy=e.clientY;
        let sw=box.offsetWidth, sh=box.offsetHeight;

        function move(ev){
            box.style.width=(sw+(ev.clientX-sx))+"px";
            box.style.height=(sh+(ev.clientY-sy))+"px";
        }
        function up(){
            document.removeEventListener("mousemove",move);
            document.removeEventListener("mouseup",up);
        }
        document.addEventListener("mousemove",move);
        document.addEventListener("mouseup",up);
    };
}
</script>

</body>
</html>

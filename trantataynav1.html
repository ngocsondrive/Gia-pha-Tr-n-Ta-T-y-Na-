<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Tran Ta Tay Na Desktop Edit Mobile View V8</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5e3bf;
      font-family: "Segoe UI", sans-serif;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    .frame-stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #f5e3bf;
      overscroll-behavior: none;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }
    .mobile-shell {
      position: absolute;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
      transform: translateX(-50%);
      z-index: 100;
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(255, 248, 237, 0.94);
      border: 1px solid rgba(112, 69, 31, 0.18);
      box-shadow: 0 14px 32px rgba(86, 48, 18, 0.18);
      backdrop-filter: blur(6px);
    }
    .mobile-shell.show { display: flex; }
    .mobile-btn {
      border: 1px solid rgba(112, 69, 31, 0.18);
      background: #fffaf0;
      color: #6b3d16;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      height: 30px;
      min-width: 30px;
      padding: 0 10px;
    }
    @media (max-width: 900px) and (orientation: portrait), (pointer: coarse) and (max-aspect-ratio: 9/10) {
      .frame-stage.mobile-landscape {
        width: 100vh;
        height: 100vw;
        top: 50%;
        left: 50%;
        right: auto;
        bottom: auto;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center center;
      }
    }
  </style>
</head>
<body>
  <div id="frameStage" class="frame-stage">
    <iframe id="appFrame" src="./background-banner-editor-7/"></iframe>
    <div id="mobileShell" class="mobile-shell">
      <button id="zoomOutBtn" class="mobile-btn" type="button">-</button>
      <button id="zoomInBtn" class="mobile-btn" type="button">+</button>
    </div>
  </div>
  <script>
    const SUPABASE_URL = 'https://fvusljteqeoytdcoxaao.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dXNsanRlcWVveXRkY294YWFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDM3MTksImV4cCI6MjA5MDUxOTcxOX0.-6wTksnJflmerln8aajmXS74FH8OXgJBqlNSp4CNPZ0';
    const TABLE_NAME = 'tree_documents';
    const DOCUMENT_ID = 'classic-main';
    const LOCAL_STORAGE_KEY = 'background-banner-editor-3-data';

    const frame = document.getElementById('appFrame');
    const frameStage = document.getElementById('frameStage');
    const mobileShell = document.getElementById('mobileShell');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');

    let editorWindowRef = null;

    function isMobileMode() {
      return window.matchMedia('(max-width: 900px)').matches || window.matchMedia('(pointer: coarse)').matches;
    }

    function isPortraitMobile() {
      return isMobileMode() && window.matchMedia('(orientation: portrait)').matches;
    }

    function injectBaseStyles(doc) {
      if (!doc || doc.getElementById('unified-sync-style')) return;
      const style = doc.createElement('style');
      style.id = 'unified-sync-style';
      style.textContent = `
        .hint { display: none !important; }
        .toolbox-drag-btn {
          border: 1px solid rgba(112, 69, 31, 0.18);
          background: #fffaf0;
          color: #6b3d16;
          height: 32px;
          padding: 0 12px;
          border-radius: 999px;
          font-size: 12px;
          font-weight: 700;
          cursor: grab;
        }
        .toolbox.dragging .toolbox-drag-btn { cursor: grabbing; }
        @media (max-width: 900px), (pointer: coarse) {
          html, body {
            overscroll-behavior: none !important;
            touch-action: none !important;
          }
          .banner {
            display: block !important;
            width: clamp(50px, 10vw, 76px) !important;
            top: 10px !important;
          }
          .banner-left {
            left: 20px !important;
            clip-path: inset(0 12% 0 13%) !important;
          }
          .banner-right {
            right: 20px !important;
            clip-path: inset(0 13% 0 12%) !important;
          }
          .topbar {
            top: 6px !important;
            right: 6px !important;
            gap: 4px !important;
            max-width: calc(100vw - 12px) !important;
          }
          .auth-btn,
          .zoom-btn,
          .tool-btn,
          .toolbox-drag-btn {
            height: 28px !important;
            padding: 0 10px !important;
            font-size: 11px !important;
          }
          .status,
          .save-state,
          .mode-pill {
            height: 28px !important;
            padding: 0 8px !important;
            font-size: 11px !important;
          }
        }
      `;
      doc.head.appendChild(style);
    }

    function supabaseHeaders(extra = {}) {
      return { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, ...extra };
    }

    function sanitizeBox(box) {
      return {
        id: String(box.id || ''), x: Number(box.x) || 0, y: Number(box.y) || 0,
        width: Math.max(24, Number(box.width) || 220), height: Math.max(24, Number(box.height) || 96),
        text: String(box.text || ''), fontSize: Math.max(10, Number(box.fontSize) || 20),
        background: /^#[0-9a-fA-F]{6}$/.test(box.background) ? box.background : '#fff6d9',
        borderColor: /^#[0-9a-fA-F]{6}$/.test(box.borderColor) ? box.borderColor : '#8b531f',
        textColor: /^#[0-9a-fA-F]{6}$/.test(box.textColor) ? box.textColor : '#5b3416',
        borderWidth: Math.max(0, Number(box.borderWidth) || 2),
      };
    }

    function sanitizeAnchor(anchor) {
      if (anchor && anchor.kind === 'box') return { kind: 'box', boxId: String(anchor.boxId || ''), side: ['left', 'right', 'top', 'bottom'].includes(anchor.side) ? anchor.side : 'top' };
      return { kind: 'point', x: Number(anchor?.x) || 0, y: Number(anchor?.y) || 0, side: ['left', 'right', 'top', 'bottom'].includes(anchor?.side) ? anchor.side : 'right' };
    }

    function sanitizeLine(line) {
      return { id: String(line.id || ''), start: sanitizeAnchor(line.start), end: sanitizeAnchor(line.end), color: /^#[0-9a-fA-F]{6}$/.test(line.color) ? line.color : '#8b531f', width: Math.max(1, Number(line.width) || 3) };
    }

    function sanitizePayload(payload) {
      return {
        boxes: Array.isArray(payload?.boxes) ? payload.boxes.map(sanitizeBox) : [],
        lines: Array.isArray(payload?.lines) ? payload.lines.map(sanitizeLine) : [],
        meta: payload?.meta && typeof payload.meta === 'object' ? payload.meta : {},
      };
    }

    async function fetchRemoteDocument() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${encodeURIComponent(DOCUMENT_ID)}&select=data`, { headers: supabaseHeaders() });
      if (!response.ok) throw new Error(`Fetch failed: ${response.status} ${await response.text()}`);
      const rows = await response.json();
      return rows[0]?.data || null;
    }

    async function saveRemoteDocument(payload) {
      const cleanPayload = sanitizePayload(payload);
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: supabaseHeaders({ 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify([{ id: DOCUMENT_ID, data: cleanPayload }]),
      });
      if (!response.ok) throw new Error(`Save failed: ${response.status} ${await response.text()}`);
      return cleanPayload;
    }

    async function verifyRemoteDocument(payload) {
      const expected = sanitizePayload(payload);
      const remote = sanitizePayload(await fetchRemoteDocument());
      if (JSON.stringify(expected) !== JSON.stringify(remote)) throw new Error('Supabase trả về dữ liệu khác với dữ liệu vừa lưu');
    }

    async function findEditorWindow() {
      let currentWin = frame.contentWindow;
      for (let depth = 0; depth < 4; depth += 1) {
        if (!currentWin) throw new Error('Không truy cập được editor');
        const currentDoc = currentWin.document;
        injectBaseStyles(currentDoc);
        if (typeof currentWin.loadData === 'function' && typeof currentWin.saveData === 'function' && typeof currentWin.setDirty === 'function') return currentWin;
        const nestedFrame = currentDoc.getElementById('appFrame');
        if (!nestedFrame) break;
        if (!nestedFrame.contentWindow || !nestedFrame.contentDocument || nestedFrame.contentDocument.readyState !== 'complete') {
          await new Promise((resolve, reject) => {
            const timer = setTimeout(() => reject(new Error('Editor tải quá lâu')), 12000);
            nestedFrame.addEventListener('load', () => { clearTimeout(timer); resolve(); }, { once: true });
          });
        }
        currentWin = nestedFrame.contentWindow;
      }
      throw new Error('Không tìm thấy editor thật');
    }

    function patchEditor(editorWin) {
      editorWin.eval(`
        if (!window.__desktopEditMobileViewPatchV9) {
          window.__desktopEditMobileViewPatchV9 = true;
          const LOCAL_STORAGE_KEY = '${LOCAL_STORAGE_KEY}';
          let isUnifiedMobileViewer = false;
          let toolboxDragState = null;
          let coordInputs = null;
          let mobileDefaultScale = null;
          let mobileTouchState = null;
          let runtimeDisplaySpace = null;
          const classicSetBaseSize = setBaseSize;
          const classicApplyTransform = applyTransform;
          const classicZoomAt = zoomAt;
          const classicLoadData = loadData;
          const classicResetView = resetView;
          const classicFitInitial = fitInitial;

          function getImageSpace() {
            const width = image.naturalWidth || image.width || window.innerWidth;
            const height = image.naturalHeight || image.height || window.innerHeight;
            return { width, height };
          }

          function getDisplaySpace() {
            if (isUnifiedMobileViewer) return getImageSpace();
            return {
              width: window.innerWidth,
              height: image.offsetHeight || image.naturalHeight || window.innerHeight,
            };
          }

          function getSafeSpace(space, fallback) {
            if (space && Number(space.width) > 0 && Number(space.height) > 0) {
              return { width: Number(space.width), height: Number(space.height) };
            }
            return fallback;
          }

          function scalePoint(point, scaleX, scaleY) {
            return { ...point, x: (point.x || 0) * scaleX, y: (point.y || 0) * scaleY };
          }

          function scaleAnchor(anchor, scaleX, scaleY) {
            if (!anchor) return anchor;
            if (anchor.kind === 'point') return scalePoint(anchor, scaleX, scaleY);
            return { ...anchor };
          }

          function scaleState(state, sourceSpace, targetSpace) {
            const source = getSafeSpace(sourceSpace, getImageSpace());
            const target = getSafeSpace(targetSpace, source);
            const scaleX = target.width / source.width;
            const scaleY = target.height / source.height;
            return {
              boxes: (state.boxes || []).map((box) => ({
                ...box,
                x: box.x * scaleX,
                y: box.y * scaleY,
                width: box.width * scaleX,
                height: box.height * scaleY,
                fontSize: box.fontSize * Math.min(scaleX, scaleY),
                borderWidth: Math.max(1, box.borderWidth * Math.min(scaleX, scaleY)),
              })),
              lines: (state.lines || []).map((line) => ({
                ...line,
                start: scaleAnchor(line.start, scaleX, scaleY),
                end: scaleAnchor(line.end, scaleX, scaleY),
                width: Math.max(1, line.width * Math.min(scaleX, scaleY)),
              })),
            };
          }

          function exportSceneState() {
            return {
              boxes: boxes.map((box) => ({ ...box })),
              lines: lines.map((line) => ({ ...line })),
            };
          }

          function applyStateToScene(state, sourceSpace, targetSpace) {
            const scaled = scaleState(state, sourceSpace, targetSpace);
            boxes = scaled.boxes;
            lines = scaled.lines;
            runtimeDisplaySpace = getSafeSpace(targetSpace, getDisplaySpace());
          }

          function normalizeSceneForDisplay(nextDisplaySpace) {
            const target = getSafeSpace(nextDisplaySpace, getDisplaySpace());
            const source = getSafeSpace(runtimeDisplaySpace, target);
            if (Math.abs(source.width - target.width) < 0.5 && Math.abs(source.height - target.height) < 0.5) {
              runtimeDisplaySpace = target;
              return;
            }
            const scaled = scaleState(exportSceneState(), source, target);
            boxes = scaled.boxes;
            lines = scaled.lines;
            runtimeDisplaySpace = target;
          }

          function createPersistedPayload() {
            const displaySpace = getSafeSpace(runtimeDisplaySpace, getDisplaySpace());
            const imageSpace = getImageSpace();
            const scaled = scaleState(exportSceneState(), displaySpace, imageSpace);
            return {
              boxes: scaled.boxes,
              lines: scaled.lines,
              meta: { coordSpace: imageSpace },
            };
          }

          function setSyncState(text, isError = false) {
            if (!saveState) return;
            saveState.style.display = 'flex';
            saveState.textContent = text;
            saveState.style.background = isError ? 'rgba(208, 86, 42, 0.12)' : 'rgba(39, 174, 96, 0.12)';
            saveState.style.color = isError ? '#9a3d1f' : '#1f7a45';
            saveState.style.borderColor = isError ? 'rgba(208, 86, 42, 0.22)' : 'rgba(39, 174, 96, 0.22)';
          }

          function clampPan() {
            const imageWidth = image.naturalWidth || image.width || window.innerWidth;
            const imageHeight = image.naturalHeight || image.height || window.innerHeight;
            const viewport = window.top.__mobileViewGetViewportV8 ? window.top.__mobileViewGetViewportV8() : { width: window.innerWidth, height: window.innerHeight };
            const minPanX = Math.min(0, viewport.width - imageWidth * scale);
            const minPanY = Math.min(0, viewport.height - imageHeight * scale);
            panX = Math.max(minPanX, Math.min(0, panX));
            panY = Math.max(minPanY, Math.min(0, panY));
          }

          function installToolboxDrag() {
            const toolbox = document.getElementById('toolbox');
            const header = toolbox && toolbox.querySelector('.toolbox-header');
            if (!toolbox || !header || header.querySelector('.toolbox-drag-btn')) return;
            toolbox.style.position = 'fixed';
            const dragBtn = document.createElement('button');
            dragBtn.type = 'button';
            dragBtn.className = 'toolbox-drag-btn';
            dragBtn.textContent = 'Di chuyen';
            header.insertBefore(dragBtn, header.firstChild);
            dragBtn.addEventListener('pointerdown', (event) => {
              if (isUnifiedMobileViewer) return;
              toolboxDragState = {
                startX: event.clientX,
                startY: event.clientY,
                originLeft: toolbox.getBoundingClientRect().left,
                originTop: toolbox.getBoundingClientRect().top,
              };
              toolbox.classList.add('dragging');
              toolbox.style.left = toolboxDragState.originLeft + 'px';
              toolbox.style.top = toolboxDragState.originTop + 'px';
              toolbox.style.right = 'auto';
              dragBtn.setPointerCapture(event.pointerId);
              event.preventDefault();
            });
            dragBtn.addEventListener('pointermove', (event) => {
              if (!toolboxDragState) return;
              const nextLeft = Math.max(8, Math.min(window.innerWidth - toolbox.offsetWidth - 8, toolboxDragState.originLeft + (event.clientX - toolboxDragState.startX)));
              const nextTop = Math.max(56, Math.min(window.innerHeight - 120, toolboxDragState.originTop + (event.clientY - toolboxDragState.startY)));
              toolbox.style.left = nextLeft + 'px';
              toolbox.style.top = nextTop + 'px';
            });
            function endDrag(event) {
              if (!toolboxDragState) return;
              toolboxDragState = null;
              toolbox.classList.remove('dragging');
              try { dragBtn.releasePointerCapture(event.pointerId); } catch {}
            }
            dragBtn.addEventListener('pointerup', endDrag);
            dragBtn.addEventListener('pointercancel', endDrag);
          }

          function ensureCoordinateInputs() {
            if (coordInputs) return coordInputs;
            const toolboxGrid = document.querySelector('.toolbox-grid');
            const toolboxStateEl = document.getElementById('toolboxState');
            if (!toolboxGrid || !toolboxStateEl) return null;
            const wrap = document.createElement('div');
            wrap.className = 'toolbox-actions';
            wrap.innerHTML = '<div class="toolbox-row" style="flex:1; min-width:110px;"><label for="boxXInput">Toa do X</label><input id="boxXInput" type="number" step="1" /></div><div class="toolbox-row" style="flex:1; min-width:110px;"><label for="boxYInput">Toa do Y</label><input id="boxYInput" type="number" step="1" /></div>';
            toolboxGrid.insertBefore(wrap, toolboxStateEl);
            const xInput = wrap.querySelector('#boxXInput');
            const yInput = wrap.querySelector('#boxYInput');
            xInput.addEventListener('input', () => { const box = getSelectedBox(); if (!box) return; updateSelectedBox({ x: Number(xInput.value) || 0 }); });
            yInput.addEventListener('input', () => { const box = getSelectedBox(); if (!box) return; updateSelectedBox({ y: Number(yInput.value) || 0 }); });
            coordInputs = { xInput, yInput };
            return coordInputs;
          }

          function installMobileTouchHandlers() {
            if (window.__mobileTouchHandlersInstalled) return;
            window.__mobileTouchHandlersInstalled = true;
            window.addEventListener('gesturestart', (event) => { if (!isUnifiedMobileViewer) return; event.preventDefault(); }, { passive: false });
            window.addEventListener('gesturechange', (event) => { if (!isUnifiedMobileViewer) return; event.preventDefault(); }, { passive: false });
            window.addEventListener('touchstart', (event) => {
              if (!isUnifiedMobileViewer) return;
              if (event.touches.length === 1) {
                mobileTouchState = { type: 'pan', startX: event.touches[0].clientX, startY: event.touches[0].clientY, basePanX: panX, basePanY: panY };
              } else if (event.touches.length === 2) {
                mobileTouchState = {
                  type: 'pinch', baseScale: scale, basePanX: panX, basePanY: panY,
                  distance: Math.hypot(event.touches[0].clientX - event.touches[1].clientX, event.touches[0].clientY - event.touches[1].clientY),
                  centerX: (event.touches[0].clientX + event.touches[1].clientX) / 2,
                  centerY: (event.touches[0].clientY + event.touches[1].clientY) / 2,
                };
                event.preventDefault();
              }
            }, { passive: false });
            window.addEventListener('touchmove', (event) => {
              if (!isUnifiedMobileViewer || !mobileTouchState) return;
              if (mobileTouchState.type === 'pan' && event.touches.length === 1) {
                panX = mobileTouchState.basePanX + (event.touches[0].clientX - mobileTouchState.startX);
                panY = mobileTouchState.basePanY + (event.touches[0].clientY - mobileTouchState.startY);
                clampPan();
                classicApplyTransform();
                event.preventDefault();
              } else if (mobileTouchState.type === 'pinch' && event.touches.length === 2) {
                const distance = Math.hypot(event.touches[0].clientX - event.touches[1].clientX, event.touches[0].clientY - event.touches[1].clientY);
                const centerX = (event.touches[0].clientX + event.touches[1].clientX) / 2;
                const centerY = (event.touches[0].clientY + event.touches[1].clientY) / 2;
                scale = Math.max(mobileDefaultScale, Math.min(maxScale, mobileTouchState.baseScale * (distance / mobileTouchState.distance)));
                panX = mobileTouchState.basePanX + (centerX - mobileTouchState.centerX);
                panY = mobileTouchState.basePanY + (centerY - mobileTouchState.centerY);
                clampPan();
                classicApplyTransform();
                event.preventDefault();
              }
            }, { passive: false });
            window.addEventListener('touchend', () => { if (isUnifiedMobileViewer) mobileTouchState = null; }, { passive: true });
          }

          function fitMobileView() {
            const imageSpace = getImageSpace();
            canvas.style.width = imageSpace.width + 'px';
            overlay.style.width = imageSpace.width + 'px';
            overlay.style.height = imageSpace.height + 'px';
            linesSvg.setAttribute('viewBox', '0 0 ' + imageSpace.width + ' ' + imageSpace.height);
            normalizeSceneForDisplay(imageSpace);
            const viewport = window.top.__mobileViewGetViewportV8 ? window.top.__mobileViewGetViewportV8() : { width: window.innerWidth, height: window.innerHeight };
            const baseScale = viewport.width / imageSpace.width;
            minScale = baseScale;
            maxScale = Math.max(baseScale * 4, 4);
            scale = baseScale;
            mobileDefaultScale = baseScale;
            panX = 0;
            panY = 0;
            clampPan();
            stage.style.overflow = 'hidden';
            document.body.style.overflow = 'hidden';
            classicApplyTransform();
            renderScene();
          }

          function fitDesktopClassic() {
            stage.style.overflow = 'auto';
            stage.style.overflowX = 'hidden';
            stage.style.overflowY = 'auto';
            document.body.style.overflow = 'auto';
            classicSetBaseSize();
            normalizeSceneForDisplay(getDisplaySpace());
            scale = minScale;
            panX = 0;
            panY = 0;
            classicApplyTransform();
            renderScene();
          }

          function setViewerLikeMode(active) {
            isUnifiedMobileViewer = active;
            const topbar = document.querySelector('.topbar');
            const toolbox = document.getElementById('toolbox');
            const miniToolbox = document.getElementById('miniToolbox');
            const hint = document.querySelector('.hint');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            if (topbar) topbar.style.display = active ? 'none' : 'flex';
            if (toolbox) { toolbox.classList.remove('open'); toolbox.style.display = active ? 'none' : ''; }
            if (miniToolbox) { miniToolbox.classList.remove('show'); miniToolbox.style.display = active ? 'none' : ''; }
            if (hint) hint.style.display = 'none';
            if (loginBtn) loginBtn.style.display = active ? 'none' : '';
            if (logoutBtn) logoutBtn.style.display = active ? 'none' : (logoutBtn.hidden ? 'none' : '');
            if (active) {
              lineMode = false;
              pendingLineStart = null;
              selectedBoxId = null;
              selectedLineId = null;
              renderScene();
            }
          }

          const originalSyncToolbox = syncToolbox;
          syncToolbox = function() {
            originalSyncToolbox();
            const controls = ensureCoordinateInputs();
            if (!controls) return;
            const box = getSelectedBox();
            controls.xInput.disabled = !box;
            controls.yInput.disabled = !box;
            controls.xInput.value = box ? Math.round(box.x) : '';
            controls.yInput.value = box ? Math.round(box.y) : '';
          };

          applyTransform = function() {
            if (isUnifiedMobileViewer) clampPan();
            classicApplyTransform();
          };

          zoomAt = function(nextScale, clientX, clientY) {
            classicZoomAt(nextScale, clientX, clientY);
            if (isUnifiedMobileViewer && scale < mobileDefaultScale) {
              scale = mobileDefaultScale;
              panX = 0;
              clampPan();
              classicApplyTransform();
            }
          };

          setBaseSize = function() {
            if (isUnifiedMobileViewer) return fitMobileView();
            const result = classicSetBaseSize();
            normalizeSceneForDisplay(getDisplaySpace());
            return result;
          };

          resetView = function() {
            if (isUnifiedMobileViewer) return fitMobileView();
            return fitDesktopClassic();
          };

          fitInitial = function() {
            if (isUnifiedMobileViewer) return fitMobileView();
            return fitDesktopClassic();
          };

          window.__setUnifiedMobileMode = function(active) {
            installToolboxDrag();
            ensureCoordinateInputs();
            installMobileTouchHandlers();
            setViewerLikeMode(active);
            if (active) fitMobileView();
            else fitDesktopClassic();
          };

          loadData = async function() {
            installToolboxDrag();
            ensureCoordinateInputs();
            installMobileTouchHandlers();
            setSyncState('Đang tải cloud...');
            try {
              const remote = await window.top.__mobileViewFetchRemoteDocumentV8();
              if (remote) {
                const cleanRemote = remote || { boxes: [], lines: [], meta: {} };
                const sourceSpace = getSafeSpace(cleanRemote.meta && cleanRemote.meta.coordSpace, getImageSpace());
                const targetSpace = getDisplaySpace();
                applyStateToScene(cleanRemote, sourceSpace, targetSpace);
                migrateLines();
                selectedBoxId = null;
                selectedLineId = null;
                renderScene();
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cleanRemote));
                setDirty(false);
                setSyncState('Đã tải cloud');
                if (isUnifiedMobileViewer) fitMobileView(); else fitDesktopClassic();
                return;
              }
              await classicLoadData();
              runtimeDisplaySpace = getDisplaySpace();
              const hasLocalData = (boxes && boxes.length) || (lines && lines.length);
              if (hasLocalData) {
                const localPayload = createPersistedPayload();
                setSyncState('Cloud trống, đang đẩy dữ liệu cũ...');
                await window.top.__mobileViewSaveRemoteDocumentV8(localPayload);
                await window.top.__mobileViewVerifyRemoteDocumentV8(localPayload);
                setSyncState('Đã đẩy dữ liệu cũ lên cloud');
              } else {
                setSyncState('Cloud đang trống');
              }
              if (isUnifiedMobileViewer) fitMobileView(); else fitDesktopClassic();
            } catch (error) {
              console.error(error);
              await classicLoadData();
              runtimeDisplaySpace = getDisplaySpace();
              setSyncState('Lỗi cloud, dùng dữ liệu máy này', true);
              if (isUnifiedMobileViewer) fitMobileView(); else fitDesktopClassic();
            }
          };

          saveData = async function() {
            const payload = createPersistedPayload();
            setSyncState('Đang lưu cloud...');
            try {
              const cleanPayload = await window.top.__mobileViewSaveRemoteDocumentV8(payload);
              await window.top.__mobileViewVerifyRemoteDocumentV8(cleanPayload);
              localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(cleanPayload));
              setDirty(false);
              setSyncState('Đã lưu cloud');
            } catch (error) {
              console.error(error);
              localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(payload));
              setDirty(true);
              setSyncState('Lỗi cloud, chỉ lưu máy này', true);
            }
          };

          let autoSaveTimer = null;
          const originalSetDirty = setDirty;
          setDirty = function(value) {
            originalSetDirty(value);
            if (!value) return;
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => { if (isDirty) saveData(); }, 1200);
          };
        }
      `);
    }

    function applyMode() {
      const mobile = isMobileMode();
      frameStage.classList.toggle('mobile-landscape', isPortraitMobile());
      mobileShell.classList.toggle('show', mobile);
      if (!editorWindowRef) return;
      injectBaseStyles(editorWindowRef.document);
      if (editorWindowRef.__setUnifiedMobileMode) {
        editorWindowRef.__isUnifiedMobileMode = mobile;
        editorWindowRef.__setUnifiedMobileMode(mobile);
      }
    }

    window.__mobileViewGetViewportV8 = () => {
      if (isPortraitMobile()) return { width: window.innerHeight, height: window.innerWidth };
      return { width: window.innerWidth, height: window.innerHeight };
    };
    window.__mobileViewFetchRemoteDocumentV8 = fetchRemoteDocument;
    window.__mobileViewSaveRemoteDocumentV8 = saveRemoteDocument;
    window.__mobileViewVerifyRemoteDocumentV8 = verifyRemoteDocument;

    window.addEventListener('touchmove', (event) => {
      if (!isMobileMode()) return;
      if (event.touches.length > 1) event.preventDefault();
    }, { passive: false });

    async function boot() {
      try {
        editorWindowRef = await findEditorWindow();
        patchEditor(editorWindowRef);
        await editorWindowRef.loadData();
        applyMode();
      } catch (error) {
        console.error(error);
      }
    }

    frame.addEventListener('load', boot);
    window.addEventListener('resize', applyMode);
    window.addEventListener('orientationchange', () => setTimeout(applyMode, 150));

    zoomInBtn.addEventListener('click', () => {
      const win = editorWindowRef;
      if (!win || !win.zoomAt) return;
      const viewport = window.__mobileViewGetViewportV8();
      win.zoomAt(win.scale * 1.2, viewport.width / 2, viewport.height / 2);
    });

    zoomOutBtn.addEventListener('click', () => {
      const win = editorWindowRef;
      if (!win || !win.zoomAt) return;
      const viewport = window.__mobileViewGetViewportV8();
      win.zoomAt(win.scale / 1.2, viewport.width / 2, viewport.height / 2);
    });
  </script>
</body>
</html>

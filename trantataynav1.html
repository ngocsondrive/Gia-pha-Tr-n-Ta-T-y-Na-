    .book-editor {

  <script>
    const SUPABASE_URL = 'https://fvusljteqeoytdcoxaao.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2dXNsanRlcWVveXRldGNveGFhbyIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzc0OTQzNzE5LCJleHAiOjIwOTA1MTk3MTl9.-6wTksnJflmerln8aajmXS74FH8OXgJBqlNSp4CNPZ0';

    const frame = document.getElementById('appFrame');

    let editorWindowRef = null;

    let currentBookPage = 0;

    function isMobileMode() {

    function injectBaseStyles(doc) {

      const style = doc.createElement('style');
      style.id = 'unified-sync-style';
      style.textContent = `

      doc.head.appendChild(style);

    function supabaseHeaders(extra = {}) {
      return { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}`, ...extra };
    }

    function sanitizeBox(box) {
      return {
        id: String(box.id || ''), x: Number(box.x) || 0, y: Number(box.y) || 0,
        width: Math.max(24, Number(box.width) || 220), height: Math.max(24, Number(box.height) || 96),
        text: String(box.text || ''), fontSize: Math.max(10, Number(box.fontSize) || 20),
        background: /^#[0-9a-fA-F]{6}$/.test(box.background) ? box.background : '#fff6d9',
        borderColor: /^#[0-9a-fA-F]{6}$/.test(box.borderColor) ? box.borderColor : '#8b531f',
        textColor: /^#[0-9a-fA-F]{6}$/.test(box.textColor) ? box.textColor : '#5b3416',
        borderWidth: Math.max(0, Number(box.borderWidth) || 2),
      };
    }
    function sanitizeAnchor(anchor) {
      if (anchor && anchor.kind === 'box') return { kind: 'box', boxId: String(anchor.boxId || ''), side: ['left', 'right', 'top', 'bottom'].includes(anchor.side) ? anchor.side : 'top' };
      return { kind: 'point', x: Number(anchor?.x) || 0, y: Number(anchor?.y) || 0, side: ['left', 'right', 'top', 'bottom'].includes(anchor?.side) ? anchor.side : 'right' };
    }
    function sanitizeLine(line) {
      const cleanLine = {
        id: String(line.id || ''),
        start: sanitizeAnchor(line.start),
        end: sanitizeAnchor(line.end),
        color: /^#[0-9a-fA-F]{6}$/.test(line.color) ? line.color : '#8b531f',
        width: Math.max(1, Number(line.width) || 3),
      };
      if (line?.pathType === 'diagonal') cleanLine.pathType = 'diagonal';
      if (Number.isFinite(Number(line?.middleSegmentCoord))) cleanLine.middleSegmentCoord = Number(line.middleSegmentCoord);
      return cleanLine;
    }
    function sanitizePayload(payload) {
      return { boxes: Array.isArray(payload?.boxes) ? payload.boxes.map(sanitizeBox) : [], lines: Array.isArray(payload?.lines) ? payload.lines.map(sanitizeLine) : [], meta: payload?.meta && typeof payload.meta === 'object' ? payload.meta : {} };
    }
    function sanitizeBookPayload(payload) {
      const title = String(payload?.title || '─É├Żc Gia Phß║Ż D├▓ng Tß╗Öc Trß║¦n Tß║Ż T├óy Nß║Ī').trim() || '─É├Żc Gia Phß║Ż D├▓ng Tß╗Öc Trß║¦n Tß║Ż T├óy Nß║Ī';
      const pages = Array.isArray(payload?.pages) ? payload.pages.map((page) => String(page ?? '')).map((page) => page.replace(/\r\n/g, '\n')) : [''];
      return { title, pages: pages.length ? pages : [''] };
    }
    async function fetchRemoteDocument() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${encodeURIComponent(DOCUMENT_ID)}&select=data`, { headers: supabaseHeaders() });
      if (!response.ok) throw new Error(`Fetch failed: ${response.status} ${await response.text()}`);
      const rows = await response.json();
      return rows[0]?.data || null;
    }
    async function saveRemoteDocument(payload) {
      const cleanPayload = sanitizePayload(payload);
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: supabaseHeaders({ 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify([{ id: DOCUMENT_ID, data: cleanPayload }]),
      });
      if (!response.ok) throw new Error(`Save failed: ${response.status} ${await response.text()}`);
      return cleanPayload;
    }
    async function verifyRemoteDocument(payload) {
      const expected = sanitizePayload(payload);
      const remote = sanitizePayload(await fetchRemoteDocument());
      if (JSON.stringify(expected) !== JSON.stringify(remote)) throw new Error('Supabase trß║Ż vß╗ü dß╗» liß╗ću kh├Īc vß╗øi dß╗» liß╗ću vß╗½la lŲ░u');
    }
    async function fetchBookDocument() {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}?id=eq.${encodeURIComponent(BOOK_DOCUMENT_ID)}&select=data`, { headers: supabaseHeaders() });
      if (!response.ok) throw new Error(@book fetch failed: ${response.status} ${await response.text()}`);
      const rows = await response.json();
      return rows[0]?.data || null;
    }
    async function saveBookDocument(payload) {
      const cleanPayload = sanitizeBookPayload(payload);
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
        method: 'POST',
        headers: supabaseHeaders({ 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates,return=minimal' }),
        body: JSON.stringify([{ id: BOOK_DOCUMENT_ID, data: cleanPayload }]),
      });
      if (!response.ok) throw new Error(`Book save failed: ${response.status} ${await response.text()}`);
      return cleanPayload;
    }
    function escapeHtml(value) {
      return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function setBookStatus(text, isError = false) {
      bookStatus.textContent = text || '';
      bookStatus.style.color = isError ? '#b1442b' : '#80522b';
    }
    function isBookEditable() {
      return Boolean(editorWindowRef && typeof editorWindowRef.isLoggedIn === 'function' && editorWindowRef.isLoggedIn());
    }
    function clampBookPage() {
      if (!bookData.pages.length) bookData.pages = [''];
      currentBookPage = Math.max(0, Math.min(currentBookPage, bookData.pages.length - 1));
    }
    function syncBookPermissionButtonsOnly() {
      const editable = isBookEditable();
      editBookBtn.disabled = !editable;
      saveBookBtn.disabled = !editable || !isBookEditMode;
      addPageBtn.disabled = !editable || !isBookEditMode;
      removePageBtn.disabled = !editable || !isBookEditMode || bookData.pages.length <= 1;
      bookAuthNote.textContent = editable ? '─Éang ─æ─āng nhß║Łp. Bß║Īn c├│ thß╗ā chß╗ēnh sß╗Ła nß╗Öi dung s├Īch.' : 'Chß╗ē ─æ┴╗Źc. ─É─āng nhß║Łp trong tr├¼nh chß╗ēnh sß╗Ła ─É├½ mß╗¤ quyß╗ün chß╗ēnh sß╗Ła nß╗Öi dung s├Īch.';
    }
    function renderBookPage() {
      clampBookPage();
      const pageText = bookData.pages[currentBookPage] || '';
      pageNumberInput.value = String(currentBookPage + 1);
      pageCountLabel.textContent = `/ ${bookData.pages.length}`;
      prevPageBtn.disabled = currentBookPage <= 0;
      nextPageBtn.disabled = currentBookPage >= bookData.pages.length - 1;
      editBookBtn.textContent = isBookEditMode ? 'Xem s├Īch' : 'Chß╗ēnh sß╗Ła';
      bookEditor.hidden = !isBookEditMode || !isBookEditable();
      bookContent.hidden = isBookEditMode && isBookEditable();
      if (isBookEditMode && isBookEditable()) { bookEditor.value = pageText; } else { bookContent.innerHTML = escapeHtml(pageText || 'Trang n├Āy chŲ░a c├│ nß╗Öi dung.').replace(/\n/g, '<br>'); }
      syncBookPermissionButtonsOnly();
    }
    function updateCurrentPageDraft() {
      if (!isBookEditMode || !isBookEditable()) return;
      bookData.pages[currentBookPage] = bookEditor.value.replace(/\r\n/g, '\n');
    }
    async function ensureBookLoaded() {
      if (hasBookLoaded) return;
      setBookStatus('─Éßng tß║Żi s├Īch...');
      try {
        const remoteBook = await fetchBookDocument();
        bookData = sanitizeBookPayload(remoteBook || bookData);
        hasBookLoaded = true;
        setBookStatus('─Éß║Ż tß║Żi s├Īch gia phß║Ż.');
      } catch (error) {
        console.error(error);
        hasBookLoaded = true;
        bookData = sanitizeBookPayload(bookData);
        setBookStatus('Kh├┤ng tß║Żi ─æŲ░ß╗Żc s├Īch tß╗½ cloud, ─æang d├╣ng nß╗Öi dung hiß╗ćn c├│.', true);
      }
      renderBookPage();
    }
    function openBookPanel() {
      bookPanel.hidden = false;
      document.body.style.overflow = 'hidden';
      ensureBookLoaded();
      renderBookPage();
    }
    function closeBookPanel() {
      updateCurrentPageDraft();
      bookPanel.hidden = true;
      document.body.style.overflow = 'hidden';
      isBookEditMode = false;
      renderBookPage();
    }
    async function saveCurrentBook() {
      if (!isBookEditable()) { setBookStatus('Bß║Īn cß║¦n ─æ─āng nhß║Łp trong tr├¼nh chß╗ēnh sß╗Ła ─æß╗ā lŲ░u

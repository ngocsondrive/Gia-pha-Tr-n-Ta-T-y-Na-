<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Tran Ta Tay Na Line Fix</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5e3bf;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }
  </style>
</head>
<body>
  <iframe id="app" src="./trantataynav1.html"></iframe>
  <script>
    const appFrame = document.getElementById('app');

    function isMobileMode() {
      return window.matchMedia('(max-width: 900px)').matches || window.matchMedia('(pointer: coarse)').matches;
    }

    async function waitFrameLoaded(frame, timeout = 12000) {
      if (!frame) throw new Error('Missing frame');
      if (frame.contentDocument && frame.contentDocument.readyState === 'complete') return;
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('Frame load timeout')), timeout);
        frame.addEventListener('load', () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
      });
    }

    async function findEditorWindow() {
      await waitFrameLoaded(appFrame);
      let currentWin = appFrame.contentWindow;
      for (let depth = 0; depth < 6; depth += 1) {
        if (!currentWin) throw new Error('Cannot access frame window');
        const doc = currentWin.document;
        const nested = doc && doc.getElementById('appFrame');
        if (!nested) {
          if (typeof currentWin.renderLines === 'function' && currentWin.linesSvg) return currentWin;
          break;
        }
        await waitFrameLoaded(nested);
        currentWin = nested.contentWindow;
      }
      if (currentWin && typeof currentWin.renderLines === 'function' && currentWin.linesSvg) return currentWin;
      throw new Error('Editor window not found');
    }

    function installMobileLineFix(editorWin) {
      if (!editorWin || editorWin.__mobileLineSeparationPatchV1) return;
      editorWin.__mobileLineSeparationPatchV1 = true;
      const classicRenderLines = editorWin.renderLines;

      function getStrokeScale(baseWidth) {
        if (!isMobileMode()) return 1;
        if (baseWidth <= 1.5) return 0.26;
        if (baseWidth <= 2.5) return 0.32;
        if (baseWidth <= 4) return 0.4;
        return 0.48;
      }

      function applyStrokeStyles() {
        if (!isMobileMode() || !editorWin.linesSvg) return;
        const groups = Array.from(editorWin.linesSvg.querySelectorAll('.line-group'));
        groups.forEach((group, index) => {
          const line = editorWin.lines && editorWin.lines[index];
          if (!line) return;
          const displayWidth = Math.max(0.24, (Number(line.width) || 1) * getStrokeScale(Number(line.width) || 1));
          const path = group.querySelector('.line-path');
          const hit = group.querySelector('.line-hit');
          const dragHit = group.querySelector('line');
          if (path) {
            path.setAttribute('stroke-width', String(displayWidth));
            path.setAttribute('vector-effect', 'non-scaling-stroke');
          }
          if (hit) {
            hit.setAttribute('stroke-width', String(Math.max(7, displayWidth + 6)));
            hit.setAttribute('vector-effect', 'non-scaling-stroke');
          }
          if (dragHit) {
            dragHit.setAttribute('stroke-width', String(Math.max(18, displayWidth + 10)));
            dragHit.setAttribute('vector-effect', 'non-scaling-stroke');
          }
        });
      }

      editorWin.renderLines = function() {
        classicRenderLines();
        applyStrokeStyles();
      };

      const classicSetUnifiedMobileMode = editorWin.__setUnifiedMobileMode;
      if (typeof classicSetUnifiedMobileMode === 'function') {
        editorWin.__setUnifiedMobileMode = function(active) {
          const result = classicSetUnifiedMobileMode(active);
          applyStrokeStyles();
          return result;
        };
      }

      applyStrokeStyles();
      try {
        editorWin.renderScene();
      } catch {}
    }

    async function boot() {
      if (!isMobileMode()) return;
      try {
        const editorWin = await findEditorWindow();
        installMobileLineFix(editorWin);
      } catch (error) {
        console.error(error);
      }
    }

    appFrame.addEventListener('load', () => {
      setTimeout(boot, 250);
    });
    window.addEventListener('resize', boot);
    window.addEventListener('orientationchange', () => setTimeout(boot, 250));
    boot();
  </script>
</body>
</html>

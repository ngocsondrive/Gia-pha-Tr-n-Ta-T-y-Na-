<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tran Ta Tay Na Editor</title>
  <style>
    :root {
      --accent: #8b531f;
      --accent-dark: #6b3d16;
      --panel: rgba(255, 248, 237, 0.96);
      --line: rgba(112, 69, 31, 0.18);
      --shadow: 0 16px 36px rgba(86, 48, 18, 0.16);
      --banner-width: clamp(84px, 9vw, 132px);
      --banner-top: 78px;
      --banner-side: 8px;
      --tool-width: min(320px, calc(100vw - 24px));
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #f5e3bf;
      font-family: "Segoe UI", sans-serif;
    }
    body.is-panning,
    body.is-dragging-box,
    body.is-resizing-box {
      user-select: none;
    }
    body.is-panning {
      cursor: grab;
      overflow: hidden;
    }
    .topbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 70;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: calc(100vw - 24px);
    }
    .auth-btn,
    .zoom-btn,
    .tool-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--accent-dark);
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .auth-btn:hover,
    .zoom-btn:hover,
    .tool-btn:hover {
      background: #fff;
    }
    .status {
      display: none;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(107, 61, 22, 0.92);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }
    .banner {
      position: fixed;
      top: var(--banner-top);
      z-index: 60;
      width: var(--banner-width);
      pointer-events: none;
      filter: drop-shadow(0 10px 18px rgba(73, 35, 12, 0.18));
    }
    .banner img {
      display: block;
      width: 100%;
      height: auto;
    }
    .banner-left {
      left: var(--banner-side);
      clip-path: inset(0 12% 0 13%);
    }
    .banner-right {
      right: var(--banner-side);
      clip-path: inset(0 13% 0 12%);
    }
    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 70;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 248, 237, 0.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 600;
      max-width: min(420px, calc(100vw - 24px));
    }
    .stage {
      position: relative;
      width: 100%;
      overflow: auto;
    }
    .canvas {
      position: relative;
      transform-origin: top left;
      will-change: transform;
    }
    .canvas img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
    }
    .box {
      position: absolute;
      min-width: 80px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #8b531f;
      color: #5b3416;
      font-size: 20px;
      font-weight: 700;
      cursor: move;
      box-shadow: 0 10px 18px rgba(54, 28, 9, 0.12);
      transition: box-shadow 160ms ease, outline-color 160ms ease, transform 160ms ease;
    }
    .box.selected {
      outline: 3px dashed #2f80ed;
      box-shadow: 0 14px 24px rgba(47, 128, 237, 0.24);
    }
    .box-content {
      width: 100%;
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.2;
    }
    .resize-handle {
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2f80ed;
      border: 2px solid #fff;
      cursor: nwse-resize;
      box-shadow: 0 4px 10px rgba(47, 128, 237, 0.35);
    }
    .toolbox {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 75;
      width: var(--tool-width);
      max-height: calc(100vh - 82px);
      overflow: auto;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(53, 28, 11, 0.22);
      display: none;
    }
    .toolbox.open { display: block; }
    .toolbox-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .toolbox h2 {
      margin: 0;
      font-size: 18px;
      color: var(--accent-dark);
    }
    .toolbox-grid {
      display: grid;
      gap: 10px;
    }
    .toolbox-row {
      display: grid;
      gap: 6px;
    }
    .toolbox-row label {
      font-size: 13px;
      font-weight: 700;
      color: #5d432f;
    }
    .toolbox-row input,
    .toolbox-row textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fffdf9;
      outline: none;
    }
    .toolbox-row textarea {
      min-height: 84px;
      resize: vertical;
    }
    .toolbox-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toolbox-actions button {
      flex: 1;
      min-width: 120px;
    }
    .mini-toolbox {
      position: fixed;
      top: 58px;
      right: 12px;
      z-index: 75;
      display: none;
    }
    .mini-toolbox.show { display: block; }
    .empty-state {
      font-size: 12px;
      color: #7a634f;
      background: rgba(255,255,255,0.5);
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px dashed rgba(112, 69, 31, 0.24);
    }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(41, 22, 9, 0.28);
      z-index: 90;
      padding: 16px;
    }
    .modal.open { display: flex; }
    .card {
      width: min(360px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(53, 28, 11, 0.22);
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--accent-dark);
    }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { font-size: 13px; font-weight: 600; color: #5d432f; }
    .field input {
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      background: #fffdf9;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }
    .secondary-btn,
    .primary-btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-weight: 700;
      cursor: pointer;
    }
    .secondary-btn { background: #fff; color: #6a4a31; }
    .primary-btn { background: var(--accent); color: #fff; border-color: transparent; }
    .error {
      min-height: 18px;
      margin-top: 8px;
      color: #b42318;
      font-size: 12px;
      font-weight: 600;
    }
    @media (max-width: 760px) {
      .banner { display: none; }
      .toolbox, .mini-toolbox { right: 8px; }
      .topbar { right: 8px; left: 8px; max-width: none; }
      .hint { left: 8px; right: 8px; max-width: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div id="status" class="status">Đang ở chế độ chỉnh sửa</div>
    <button id="zoomOutBtn" class="zoom-btn" type="button">-</button>
    <button id="zoomResetBtn" class="zoom-btn" type="button">100%</button>
    <button id="zoomInBtn" class="zoom-btn" type="button">+</button>
    <button id="loginBtn" class="auth-btn" type="button">Đăng nhập</button>
    <button id="logoutBtn" class="auth-btn" type="button" hidden>Đăng xuất</button>
  </div>

  <div class="banner banner-left">
    <img src="../1a.png" alt="Câu đối trái">
  </div>
  <div class="banner banner-right">
    <img src="../1b.png" alt="Câu đối phải">
  </div>

  <div class="hint">Sau khi đăng nhập, toolbox sẽ hiện để tạo/chỉnh box. Ctrl+Z để hoàn tác, Delete để xóa box đang chọn.</div>

  <aside id="toolbox" class="toolbox">
    <div class="toolbox-header">
      <h2>Toolbox</h2>
      <button id="collapseToolboxBtn" class="tool-btn" type="button">Thu nhỏ</button>
    </div>
    <div class="toolbox-grid">
      <div class="toolbox-actions">
        <button id="addBoxBtn" class="tool-btn" type="button">Tạo box</button>
        <button id="deleteBoxBtn" class="tool-btn" type="button">Xóa box</button>
      </div>
      <div class="toolbox-row">
        <label for="boxTextInput">Nội dung</label>
        <textarea id="boxTextInput" placeholder="Nhập chữ cho box"></textarea>
      </div>
      <div class="toolbox-row">
        <label for="boxBgInput">Màu nền</label>
        <input id="boxBgInput" type="color" value="#fff6d9">
      </div>
      <div class="toolbox-row">
        <label for="boxBorderInput">Màu viền</label>
        <input id="boxBorderInput" type="color" value="#8b531f">
      </div>
      <div class="toolbox-row">
        <label for="boxTextColorInput">Màu chữ</label>
        <input id="boxTextColorInput" type="color" value="#5b3416">
      </div>
      <div class="toolbox-row">
        <label for="boxBorderWidthInput">Độ dày viền</label>
        <input id="boxBorderWidthInput" type="number" min="0" max="20" step="1" value="2">
      </div>
      <div id="toolboxState" class="empty-state">Chưa chọn box nào. Bấm `Tạo box` để thêm box mới.</div>
    </div>
  </aside>

  <div id="miniToolbox" class="mini-toolbox">
    <button id="openToolboxBtn" class="tool-btn" type="button">Mở toolbox</button>
  </div>

  <main id="stage" class="stage">
    <div id="canvas" class="canvas">
      <img id="mainImage" src="../12%20(2).png" alt="Background 12 (2)">
      <div id="overlay" class="overlay"></div>
    </div>
  </main>

  <div id="loginModal" class="modal" aria-hidden="true">
    <div class="card">
      <h2>Đăng nhập chỉnh sửa</h2>
      <div class="field">
        <label for="username">Tài khoản</label>
        <input id="username" type="text" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password" autocomplete="current-password">
      </div>
      <div class="actions">
        <button id="cancelBtn" class="secondary-btn" type="button">Hủy</button>
        <button id="submitBtn" class="primary-btn" type="button">Vào chỉnh sửa</button>
      </div>
      <div id="error" class="error"></div>
    </div>
  </div>

  <script>
    const AUTH_KEY = 'background-scroll-admin-auth';
    const USERNAME = 'admin';
    const PASSWORD = '123456';
    const BOXES_KEY = 'background-banner-editor-boxes';

    const stage = document.getElementById('stage');
    const canvas = document.getElementById('canvas');
    const overlay = document.getElementById('overlay');
    const image = document.getElementById('mainImage');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const statusEl = document.getElementById('status');
    const modal = document.getElementById('loginModal');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const toolbox = document.getElementById('toolbox');
    const miniToolbox = document.getElementById('miniToolbox');
    const collapseToolboxBtn = document.getElementById('collapseToolboxBtn');
    const openToolboxBtn = document.getElementById('openToolboxBtn');
    const addBoxBtn = document.getElementById('addBoxBtn');
    const deleteBoxBtn = document.getElementById('deleteBoxBtn');
    const boxTextInput = document.getElementById('boxTextInput');
    const boxBgInput = document.getElementById('boxBgInput');
    const boxBorderInput = document.getElementById('boxBorderInput');
    const boxTextColorInput = document.getElementById('boxTextColorInput');
    const boxBorderWidthInput = document.getElementById('boxBorderWidthInput');
    const toolboxState = document.getElementById('toolboxState');

    let minScale = 1;
    let scale = 1;
    let maxScale = 4;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let startPanX = 0;
    let startPanY = 0;
    let startMouseX = 0;
    let startMouseY = 0;

    let boxes = [];
    let selectedBoxId = null;
    let historyStack = [];
    let isDraggingBox = false;
    let isResizingBox = false;
    let activeBoxId = null;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragOriginX = 0;
    let dragOriginY = 0;
    let resizeOriginWidth = 0;
    let resizeOriginHeight = 0;

    function isLoggedIn() {
      return sessionStorage.getItem(AUTH_KEY) === 'true';
    }

    function renderAuth() {
      const loggedIn = isLoggedIn();
      loginBtn.hidden = loggedIn;
      logoutBtn.hidden = !loggedIn;
      statusEl.style.display = loggedIn ? 'flex' : 'none';
      toolbox.classList.toggle('open', loggedIn && !miniToolbox.classList.contains('show'));
      if (!loggedIn) {
        toolbox.classList.remove('open');
        miniToolbox.classList.remove('show');
      }
    }

    function openModal() {
      errorEl.textContent = '';
      usernameInput.value = '';
      passwordInput.value = '';
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      setTimeout(() => usernameInput.focus(), 0);
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }

    function setBaseSize() {
      canvas.style.width = `${window.innerWidth}px`;
      stage.style.height = `${window.innerHeight}px`;
    }

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      zoomResetBtn.textContent = `${Math.round(scale * 100)}%`;
    }

    function resetView() {
      scale = minScale;
      panX = 0;
      panY = 0;
      document.body.style.overflow = 'auto';
      setBaseSize();
      applyTransform();
    }

    function zoomAt(nextScale, clientX, clientY) {
      const boundedScale = Math.min(maxScale, Math.max(minScale, nextScale));
      if (boundedScale === scale) return;

      const rect = canvas.getBoundingClientRect();
      const pointX = clientX - rect.left;
      const pointY = clientY - rect.top;
      const ratio = boundedScale / scale;

      panX = clientX - pointX * ratio;
      panY = clientY - pointY * ratio;
      scale = boundedScale;

      document.body.style.overflow = scale > minScale ? 'hidden' : 'auto';
      if (scale === minScale) {
        panX = 0;
        panY = 0;
      }
      applyTransform();
    }

    function fitInitial() {
      minScale = 1;
      resetView();
    }

    function pushHistory() {
      historyStack.push(JSON.stringify(boxes));
      if (historyStack.length > 50) historyStack.shift();
    }

    function saveBoxes() {
      localStorage.setItem(BOXES_KEY, JSON.stringify(boxes));
    }

    function loadBoxes() {
      try {
        boxes = JSON.parse(localStorage.getItem(BOXES_KEY) || '[]');
      } catch {
        boxes = [];
      }
    }

    function getSelectedBox() {
      return boxes.find((box) => box.id === selectedBoxId) || null;
    }

    function renderBoxes() {
      overlay.innerHTML = '';
      boxes.forEach((box) => {
        const el = document.createElement('div');
        el.className = `box${box.id === selectedBoxId ? ' selected' : ''}`;
        el.style.left = `${box.x}px`;
        el.style.top = `${box.y}px`;
        el.style.width = `${box.width}px`;
        el.style.height = `${box.height}px`;
        el.style.background = box.background;
        el.style.borderColor = box.borderColor;
        el.style.color = box.textColor;
        el.style.borderWidth = `${box.borderWidth}px`;
        el.dataset.id = box.id;

        const content = document.createElement('div');
        content.className = 'box-content';
        content.textContent = box.text;
        el.appendChild(content);

        const handle = document.createElement('div');
        handle.className = 'resize-handle';
        handle.dataset.id = box.id;
        el.appendChild(handle);

        el.addEventListener('mousedown', onBoxMouseDown);
        handle.addEventListener('mousedown', onResizeMouseDown);
        el.addEventListener('click', (event) => {
          event.stopPropagation();
          selectBox(box.id);
        });

        overlay.appendChild(el);
      });
      syncToolbox();
    }

    function selectBox(id) {
      selectedBoxId = id;
      renderBoxes();
    }

    function syncToolbox() {
      const box = getSelectedBox();
      const enabled = Boolean(box);
      boxTextInput.disabled = !enabled;
      boxBgInput.disabled = !enabled;
      boxBorderInput.disabled = !enabled;
      boxTextColorInput.disabled = !enabled;
      boxBorderWidthInput.disabled = !enabled;
      deleteBoxBtn.disabled = !enabled;

      if (!box) {
        boxTextInput.value = '';
        boxBgInput.value = '#fff6d9';
        boxBorderInput.value = '#8b531f';
        boxTextColorInput.value = '#5b3416';
        boxBorderWidthInput.value = '2';
        toolboxState.textContent = 'Chưa chọn box nào. Bấm `Tạo box` để thêm box mới.';
        return;
      }

      boxTextInput.value = box.text;
      boxBgInput.value = normalizeColor(box.background, '#fff6d9');
      boxBorderInput.value = normalizeColor(box.borderColor, '#8b531f');
      boxTextColorInput.value = normalizeColor(box.textColor, '#5b3416');
      boxBorderWidthInput.value = String(box.borderWidth);
      toolboxState.textContent = `Đang chỉnh box: ${box.id}`;
    }

    function normalizeColor(value, fallback) {
      if (/^#[0-9a-fA-F]{6}$/.test(value)) return value;
      return fallback;
    }

    function addBox() {
      pushHistory();
      const id = `box-${Date.now()}`;
      boxes.push({
        id,
        x: 120,
        y: 160 + boxes.length * 20,
        width: 220,
        height: 96,
        text: 'Box mới',
        background: '#fff6d9',
        borderColor: '#8b531f',
        textColor: '#5b3416',
        borderWidth: 2,
      });
      selectedBoxId = id;
      saveBoxes();
      renderBoxes();
    }

    function deleteSelectedBox() {
      const box = getSelectedBox();
      if (!box) return;
      pushHistory();
      boxes = boxes.filter((item) => item.id !== box.id);
      selectedBoxId = null;
      saveBoxes();
      renderBoxes();
    }

    function updateSelectedBox(patch) {
      const box = getSelectedBox();
      if (!box) return;
      Object.assign(box, patch);
      saveBoxes();
      renderBoxes();
    }

    function undoBoxes() {
      const previous = historyStack.pop();
      if (!previous) return;
      boxes = JSON.parse(previous);
      if (!boxes.some((box) => box.id === selectedBoxId)) selectedBoxId = null;
      saveBoxes();
      renderBoxes();
    }

    function onBoxMouseDown(event) {
      if (!isLoggedIn()) return;
      if (event.target.classList.contains('resize-handle')) return;
      if (event.button !== 0) return;
      const id = event.currentTarget.dataset.id;
      const box = boxes.find((item) => item.id === id);
      if (!box) return;
      pushHistory();
      selectBox(id);
      isDraggingBox = true;
      activeBoxId = id;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragOriginX = box.x;
      dragOriginY = box.y;
      document.body.classList.add('is-dragging-box');
      event.preventDefault();
      event.stopPropagation();
    }

    function onResizeMouseDown(event) {
      if (!isLoggedIn()) return;
      if (event.button !== 0) return;
      const id = event.currentTarget.dataset.id;
      const box = boxes.find((item) => item.id === id);
      if (!box) return;
      pushHistory();
      selectBox(id);
      isResizingBox = true;
      activeBoxId = id;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      resizeOriginWidth = box.width;
      resizeOriginHeight = box.height;
      document.body.classList.add('is-resizing-box');
      event.preventDefault();
      event.stopPropagation();
    }

    function moveActiveBox(event) {
      const box = boxes.find((item) => item.id === activeBoxId);
      if (!box) return;
      box.x = Math.max(0, dragOriginX + (event.clientX - dragStartX) / scale);
      box.y = Math.max(0, dragOriginY + (event.clientY - dragStartY) / scale);
      saveBoxes();
      renderBoxes();
    }

    function resizeActiveBox(event) {
      const box = boxes.find((item) => item.id === activeBoxId);
      if (!box) return;
      box.width = Math.max(80, resizeOriginWidth + (event.clientX - dragStartX) / scale);
      box.height = Math.max(40, resizeOriginHeight + (event.clientY - dragStartY) / scale);
      saveBoxes();
      renderBoxes();
    }

    function stopBoxInteractions() {
      isDraggingBox = false;
      isResizingBox = false;
      activeBoxId = null;
      document.body.classList.remove('is-dragging-box');
      document.body.classList.remove('is-resizing-box');
    }

    image.addEventListener('load', fitInitial);
    window.addEventListener('resize', () => {
      if (scale === minScale) {
        resetView();
      } else {
        setBaseSize();
        applyTransform();
      }
    });

    window.addEventListener('wheel', (event) => {
      if (event.ctrlKey) {
        event.preventDefault();
        const delta = event.deltaY < 0 ? 1.12 : 1 / 1.12;
        zoomAt(scale * delta, event.clientX, event.clientY);
      }
    }, { passive: false });

    window.addEventListener('mousedown', (event) => {
      if (event.button !== 1 || scale <= minScale) return;
      if (event.target.closest('.toolbox') || event.target.closest('.topbar')) return;
      event.preventDefault();
      isPanning = true;
      startMouseX = event.clientX;
      startMouseY = event.clientY;
      startPanX = panX;
      startPanY = panY;
      document.body.classList.add('is-panning');
    });

    window.addEventListener('mousemove', (event) => {
      if (isDraggingBox) {
        moveActiveBox(event);
        return;
      }
      if (isResizingBox) {
        resizeActiveBox(event);
        return;
      }
      if (!isPanning) return;
      panX = startPanX + (event.clientX - startMouseX);
      panY = startPanY + (event.clientY - startMouseY);
      applyTransform();
    });

    function stopPan() {
      isPanning = false;
      document.body.classList.remove('is-panning');
    }

    window.addEventListener('mouseup', () => {
      stopPan();
      stopBoxInteractions();
    });
    window.addEventListener('blur', () => {
      stopPan();
      stopBoxInteractions();
    });

    zoomInBtn.addEventListener('click', () => zoomAt(scale * 1.2, window.innerWidth / 2, window.innerHeight / 2));
    zoomOutBtn.addEventListener('click', () => zoomAt(scale / 1.2, window.innerWidth / 2, window.innerHeight / 2));
    zoomResetBtn.addEventListener('click', resetView);

    loginBtn.addEventListener('click', openModal);
    cancelBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    submitBtn.addEventListener('click', () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (username === USERNAME && password === PASSWORD) {
        sessionStorage.setItem(AUTH_KEY, 'true');
        renderAuth();
        toolbox.classList.add('open');
        miniToolbox.classList.remove('show');
        closeModal();
        return;
      }
      errorEl.textContent = 'Sai tài khoản hoặc mật khẩu.';
    });

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem(AUTH_KEY);
      toolbox.classList.remove('open');
      miniToolbox.classList.remove('show');
      renderAuth();
    });

    collapseToolboxBtn.addEventListener('click', () => {
      toolbox.classList.remove('open');
      miniToolbox.classList.add('show');
    });

    openToolboxBtn.addEventListener('click', () => {
      toolbox.classList.add('open');
      miniToolbox.classList.remove('show');
    });

    addBoxBtn.addEventListener('click', addBox);
    deleteBoxBtn.addEventListener('click', deleteSelectedBox);

    boxTextInput.addEventListener('input', () => updateSelectedBox({ text: boxTextInput.value }));
    boxBgInput.addEventListener('input', () => updateSelectedBox({ background: boxBgInput.value }));
    boxBorderInput.addEventListener('input', () => updateSelectedBox({ borderColor: boxBorderInput.value }));
    boxTextColorInput.addEventListener('input', () => updateSelectedBox({ textColor: boxTextColorInput.value }));
    boxBorderWidthInput.addEventListener('input', () => updateSelectedBox({ borderWidth: Math.max(0, Number(boxBorderWidthInput.value) || 0) }));

    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) {
        selectedBoxId = null;
        renderBoxes();
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
      if (event.key === 'Enter' && modal.classList.contains('open')) submitBtn.click();
      if (event.key === '+' || event.key === '=') zoomAt(scale * 1.2, window.innerWidth / 2, window.innerHeight / 2);
      if (event.key === '-') zoomAt(scale / 1.2, window.innerWidth / 2, window.innerHeight / 2);
      if (event.key === '0') resetView();
      if (!isLoggedIn()) return;
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
        event.preventDefault();
        undoBoxes();
      }
      if (event.key === 'Delete') {
        event.preventDefault();
        deleteSelectedBox();
      }
    });

    loadBoxes();
    renderAuth();
    renderBoxes();
    if (image.complete) fitInitial();
  </script>
</body>
</html>

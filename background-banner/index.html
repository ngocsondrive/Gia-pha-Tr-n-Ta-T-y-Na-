<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tran Ta Tay Na Banner</title>
  <style>
    :root {
      --side-width: min(12vw, 180px);
      --gap: 18px;
      --accent: #8b531f;
      --panel: rgba(255, 248, 237, 0.94);
      --line: rgba(112, 69, 31, 0.18);
      --shadow: 0 16px 36px rgba(86, 48, 18, 0.16);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f5e3bf;
      font-family: "Segoe UI", sans-serif;
    }
    body {
      overflow-y: auto;
      overflow-x: hidden;
    }
    .topbar {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 40;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: calc(100vw - 24px);
    }
    .auth-btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--accent);
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .auth-btn:hover { background: #fff; }
    .status {
      display: none;
      align-items: center;
      padding: 0 12px;
      height: 34px;
      border-radius: 999px;
      background: rgba(107, 61, 22, 0.92);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      box-shadow: var(--shadow);
    }
    .layout {
      width: 100%;
      display: grid;
      grid-template-columns: var(--side-width) minmax(0, 1fr) var(--side-width);
      gap: var(--gap);
      align-items: start;
      padding: 0 var(--gap);
    }
    .banner-col {
      position: sticky;
      top: 12px;
      align-self: start;
      padding-top: 64px;
    }
    .banner {
      width: 100%;
      display: block;
      height: auto;
      box-shadow: var(--shadow);
      border-radius: 12px;
    }
    .main {
      min-width: 0;
      padding-top: 0;
    }
    .main img {
      display: block;
      width: 100%;
      height: auto;
    }
    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 40;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255, 248, 237, 0.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
    }
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(41, 22, 9, 0.28);
      z-index: 60;
      padding: 16px;
    }
    .modal.open { display: flex; }
    .card {
      width: min(360px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(53, 28, 11, 0.22);
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--accent);
    }
    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field label { font-size: 13px; font-weight: 600; color: #5d432f; }
    .field input {
      height: 40px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 0 12px;
      font-size: 14px;
      outline: none;
      background: #fffdf9;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }
    .secondary-btn,
    .primary-btn {
      height: 38px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-weight: 700;
      cursor: pointer;
    }
    .secondary-btn { background: #fff; color: #6a4a31; }
    .primary-btn { background: var(--accent); color: #fff; border-color: transparent; }
    .error {
      min-height: 18px;
      margin-top: 8px;
      color: #b42318;
      font-size: 12px;
      font-weight: 600;
    }
    @media (max-width: 980px) {
      :root { --side-width: 110px; --gap: 10px; }
    }
    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
        padding: 0;
      }
      .banner-col {
        display: none;
      }
      .main img {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div id="status" class="status">Đang ở chế độ chỉnh sửa</div>
    <button id="loginBtn" class="auth-btn" type="button">Đăng nhập</button>
    <button id="logoutBtn" class="auth-btn" type="button" hidden>Đăng xuất</button>
  </div>

  <div class="hint">Hai câu đối bám hai bên và đi theo khi cuộn trang.</div>

  <div class="layout">
    <aside class="banner-col">
      <img class="banner" src="../1a.png" alt="Cau doi trai">
    </aside>

    <main class="main">
      <img src="../12%20(2).png" alt="Background 12 (2)">
    </main>

    <aside class="banner-col">
      <img class="banner" src="../1b.png" alt="Cau doi phai">
    </aside>
  </div>

  <div id="loginModal" class="modal" aria-hidden="true">
    <div class="card">
      <h2>Đăng nhập chỉnh sửa</h2>
      <div class="field">
        <label for="username">Tài khoản</label>
        <input id="username" type="text" autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password" autocomplete="current-password">
      </div>
      <div class="actions">
        <button id="cancelBtn" class="secondary-btn" type="button">Hủy</button>
        <button id="submitBtn" class="primary-btn" type="button">Vào chỉnh sửa</button>
      </div>
      <div id="error" class="error"></div>
    </div>
  </div>

  <script>
    const AUTH_KEY = 'background-scroll-admin-auth';
    const USERNAME = 'admin';
    const PASSWORD = '123456';

    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const statusEl = document.getElementById('status');
    const modal = document.getElementById('loginModal');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    function renderAuth() {
      const loggedIn = sessionStorage.getItem(AUTH_KEY) === 'true';
      loginBtn.hidden = loggedIn;
      logoutBtn.hidden = !loggedIn;
      statusEl.style.display = loggedIn ? 'flex' : 'none';
    }

    function openModal() {
      errorEl.textContent = '';
      usernameInput.value = '';
      passwordInput.value = '';
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
      setTimeout(() => usernameInput.focus(), 0);
    }

    function closeModal() {
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }

    loginBtn.addEventListener('click', openModal);
    cancelBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    submitBtn.addEventListener('click', () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      if (username === USERNAME && password === PASSWORD) {
        sessionStorage.setItem(AUTH_KEY, 'true');
        renderAuth();
        closeModal();
        return;
      }
      errorEl.textContent = 'Sai tài khoản hoặc mật khẩu.';
    });

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem(AUTH_KEY);
      renderAuth();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
      if (event.key === 'Enter' && modal.classList.contains('open')) submitBtn.click();
    });

    renderAuth();
  </script>
</body>
</html>

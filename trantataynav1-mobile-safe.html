<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Tran Ta Tay Na Mobile Safe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5e3bf;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }
  </style>
</head>
<body>
  <iframe id="app" src="./trantataynav1.html"></iframe>
  <script>
    const appFrame = document.getElementById('app');

    function isMobileMode() {
      return window.matchMedia('(max-width: 900px)').matches || window.matchMedia('(pointer: coarse)').matches;
    }

    async function waitFrameLoaded(frame, timeout = 12000) {
      if (!frame) throw new Error('Missing frame');
      if (frame.contentDocument && frame.contentDocument.readyState === 'complete') return;
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error('Frame load timeout')), timeout);
        frame.addEventListener('load', () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
      });
    }

    function patchPayloadSanitizers(hostWin) {
      if (!hostWin || hostWin.__safeDiagonalPayloadPatchV1) return;
      hostWin.__safeDiagonalPayloadPatchV1 = true;

      function sanitizeAnchor(anchor) {
        if (anchor && anchor.kind === 'box') {
          return {
            kind: 'box',
            boxId: String(anchor.boxId || ''),
            side: ['left', 'right', 'top', 'bottom'].includes(anchor.side) ? anchor.side : 'top'
          };
        }
        if (anchor && anchor.kind === 'line') {
          return {
            kind: 'line',
            lineId: String(anchor.lineId || ''),
            segment: ['start', 'middle', 'end'].includes(anchor.segment) ? anchor.segment : 'middle'
          };
        }
        return {
          kind: 'point',
          x: Number(anchor && anchor.x) || 0,
          y: Number(anchor && anchor.y) || 0,
          side: ['left', 'right', 'top', 'bottom'].includes(anchor && anchor.side) ? anchor.side : 'right'
        };
      }

      function sanitizeLine(line) {
        const pathType = line && line.pathType === 'diagonal' ? 'diagonal' : undefined;
        const middleSegmentCoord = Number(line && line.middleSegmentCoord);
        return {
          id: String(line && line.id || ''),
          start: sanitizeAnchor(line && line.start),
          end: sanitizeAnchor(line && line.end),
          color: /^#[0-9a-fA-F]{6}$/.test(line && line.color) ? line.color : '#8b531f',
          width: Math.max(1, Number(line && line.width) || 3),
          ...(pathType ? { pathType } : {}),
          ...(Number.isFinite(middleSegmentCoord) ? { middleSegmentCoord } : {})
        };
      }

      function sanitizeBox(box) {
        return {
          id: String(box && box.id || ''),
          x: Number(box && box.x) || 0,
          y: Number(box && box.y) || 0,
          width: Math.max(24, Number(box && box.width) || 220),
          height: Math.max(24, Number(box && box.height) || 96),
          text: String(box && box.text || ''),
          fontSize: Math.max(10, Number(box && box.fontSize) || 20),
          background: /^#[0-9a-fA-F]{6}$/.test(box && box.background) ? box.background : '#fff6d9',
          borderColor: /^#[0-9a-fA-F]{6}$/.test(box && box.borderColor) ? box.borderColor : '#8b531f',
          textColor: /^#[0-9a-fA-F]{6}$/.test(box && box.textColor) ? box.textColor : '#5b3416',
          borderWidth: Math.max(0, Number(box && box.borderWidth) || 2),
          ...((box && (box.textDirection === 'vertical' || box.textDirection === 'horizontal')) ? { textDirection: box.textDirection } : {})
        };
      }

      function sanitizePayload(payload) {
        return {
          boxes: Array.isArray(payload && payload.boxes) ? payload.boxes.map(sanitizeBox) : [],
          lines: Array.isArray(payload && payload.lines) ? payload.lines.map(sanitizeLine) : [],
          meta: payload && typeof payload.meta === 'object' ? payload.meta : {}
        };
      }

      const originalSave = hostWin.__mobileViewSaveRemoteDocumentV8;
      const originalVerify = hostWin.__mobileViewVerifyRemoteDocumentV8;
      const originalFetch = hostWin.__mobileViewFetchRemoteDocumentV8;

      hostWin.__mobileViewSaveRemoteDocumentV8 = async function(payload) {
        return originalSave.call(this, sanitizePayload(payload));
      };

      hostWin.__mobileViewVerifyRemoteDocumentV8 = async function(payload) {
        return originalVerify.call(this, sanitizePayload(payload));
      };

      hostWin.__mobileViewFetchRemoteDocumentV8 = async function() {
        const remote = await originalFetch.call(this);
        return remote ? sanitizePayload(remote) : remote;
      };
    }

    function patchEditorLines(editorWin) {
      if (!editorWin || editorWin.__safeDiagonalRenderPatchV1) return;
      editorWin.__safeDiagonalRenderPatchV1 = true;
      const classicRenderLines = editorWin.renderLines;

      function applyMobileStyles() {
        if (!isMobileMode() || !editorWin.linesSvg) return;
        const groups = Array.from(editorWin.linesSvg.querySelectorAll('.line-group'));
        groups.forEach((group, index) => {
          const line = editorWin.lines && editorWin.lines[index];
          if (!line || line.pathType !== 'diagonal') return;
          const path = group.querySelector('.line-path');
          const hit = group.querySelector('.line-hit');
          const baseWidth = Number(line.width) || 1;
          const displayWidth = Math.max(1.15, baseWidth * 0.95);
          if (path) {
            path.setAttribute('stroke-width', String(displayWidth));
            path.setAttribute('vector-effect', 'non-scaling-stroke');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
          }
          if (hit) {
            hit.setAttribute('stroke-width', String(Math.max(9, displayWidth + 7)));
            hit.setAttribute('vector-effect', 'non-scaling-stroke');
            hit.setAttribute('stroke-linecap', 'round');
            hit.setAttribute('stroke-linejoin', 'round');
          }
        });
      }

      editorWin.renderLines = function() {
        classicRenderLines();
        applyMobileStyles();
      };

      const classicSetUnifiedMobileMode = editorWin.__setUnifiedMobileMode;
      if (typeof classicSetUnifiedMobileMode === 'function') {
        editorWin.__setUnifiedMobileMode = function(active) {
          const result = classicSetUnifiedMobileMode(active);
          applyMobileStyles();
          return result;
        };
      }
    }

    async function findEditorWindow() {
      await waitFrameLoaded(appFrame);
      const hostWin = appFrame.contentWindow;
      if (!hostWin) throw new Error('Cannot access host window');
      let currentWin = hostWin;
      for (let depth = 0; depth < 6; depth += 1) {
        const doc = currentWin.document;
        const nested = doc && doc.getElementById('appFrame');
        if (!nested) {
          if (typeof currentWin.renderLines === 'function' && currentWin.linesSvg) {
            return { hostWin, editorWin: currentWin };
          }
          break;
        }
        await waitFrameLoaded(nested);
        currentWin = nested.contentWindow;
      }
      throw new Error('Editor window not found');
    }

    async function boot() {
      try {
        const { hostWin, editorWin } = await findEditorWindow();
        patchPayloadSanitizers(hostWin);
        patchEditorLines(editorWin);
        try { editorWin.renderScene(); } catch {}
      } catch (error) {
        console.error(error);
      }
    }

    appFrame.addEventListener('load', () => setTimeout(boot, 250));
    window.addEventListener('resize', () => setTimeout(boot, 150));
    window.addEventListener('orientationchange', () => setTimeout(boot, 250));
    boot();
  </script>
</body>
</html>
